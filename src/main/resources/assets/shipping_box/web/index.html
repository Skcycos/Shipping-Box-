<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <style>
      :root {
        --bg: #0b0c0f;
        --bg-g1: rgba(10, 132, 255, 0.22);
        --bg-g2: rgba(48, 209, 88, 0.12);
        --bg-g3: rgba(255, 69, 58, 0.10);

        --panel: rgba(255, 255, 255, 0.06);
        --panel-2: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.62);
        --muted-2: rgba(255, 255, 255, 0.46);
        --accent: #0a84ff;
        --danger: #ff453a;
        --ok: #30d158;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        --radius: 16px;
        --radius-sm: 12px;
        --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        --topbar-bg1: rgba(255,255,255,0.08);
        --topbar-bg2: rgba(255,255,255,0.05);
        --hover: rgba(255, 255, 255, 0.10);
        --item-bg: rgba(255, 255, 255, 0.04);
        --item-bg-hover: rgba(255, 255, 255, 0.07);
        --badge-bg: rgba(255,255,255,0.06);
        --placeholder: rgba(255,255,255,0.35);
        --input-bg: rgba(255, 255, 255, 0.06);
        --chip-bg: rgba(255,255,255,0.06);
        --chip-border: rgba(255,255,255,0.14);
        --icon-bg: rgba(255, 255, 255, 0.06);
        --icon-border: rgba(255,255,255,0.14);
        --sep: rgba(255,255,255,0.10);
        --scrollbar-thumb: rgba(255,255,255,0.12);
        --toast-bg: rgba(20, 20, 24, 0.88);
        --toast-text: rgba(255,255,255,0.9);
        --toast-border: rgba(255,255,255,0.14);
      }

      :root[data-theme="light"] {
        --bg: #f5f6f8;
        --bg-g1: rgba(10, 132, 255, 0.14);
        --bg-g2: rgba(48, 209, 88, 0.10);
        --bg-g3: rgba(255, 69, 58, 0.08);

        --panel: rgba(255, 255, 255, 0.56);
        --panel-2: rgba(255, 255, 255, 0.66);
        --border: rgba(0, 0, 0, 0.10);
        --text: rgba(0, 0, 0, 0.88);
        --muted: rgba(0, 0, 0, 0.60);
        --muted-2: rgba(0, 0, 0, 0.44);
        --accent: #0a84ff;
        --danger: #d70015;
        --ok: #1f8a3b;
        --shadow: 0 18px 55px rgba(0, 0, 0, 0.12);
        --topbar-bg1: rgba(255,255,255,0.74);
        --topbar-bg2: rgba(255,255,255,0.56);
        --hover: rgba(0, 0, 0, 0.06);
        --item-bg: rgba(255, 255, 255, 0.54);
        --item-bg-hover: rgba(255, 255, 255, 0.70);
        --badge-bg: rgba(255,255,255,0.56);
        --placeholder: rgba(0,0,0,0.35);
        --input-bg: rgba(255, 255, 255, 0.74);
        --chip-bg: rgba(255,255,255,0.60);
        --chip-border: rgba(0,0,0,0.10);
        --icon-bg: rgba(255, 255, 255, 0.70);
        --icon-border: rgba(0,0,0,0.10);
        --sep: rgba(0,0,0,0.08);
        --scrollbar-thumb: rgba(0,0,0,0.16);
        --toast-bg: rgba(255, 255, 255, 0.78);
        --toast-text: rgba(0,0,0,0.86);
        --toast-border: rgba(0,0,0,0.10);
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100vh; }
      body {
        margin: 0;
        font-family: var(--font);
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 20% -10%, var(--bg-g1), transparent 60%),
          radial-gradient(900px 700px at 100% 0%, var(--bg-g2), transparent 55%),
          radial-gradient(700px 600px at 0% 100%, var(--bg-g3), transparent 60%),
          var(--bg);
        background-attachment: fixed;
        background-repeat: no-repeat;
        transition: background 0.3s ease, color 0.3s ease;
      }
      .app {
        position: relative;
        z-index: 1;
        max-width: 1240px;
        margin: 0 auto;
        padding: 28px 18px 32px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, var(--topbar-bg1), var(--topbar-bg2));
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      }
      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 220px;
      }
      .brand-title {
        font-size: 15px;
        letter-spacing: 0.2px;
        font-weight: 650;
      }
      .brand-sub {
        font-size: 12px;
        color: var(--muted);
        transition: color 0.3s ease;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .file {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 999px;
        font-size: 12.5px;
        outline: none;
        width: 260px;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .file::placeholder { color: var(--placeholder); }
      .btn {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 12.5px;
        line-height: 1;
        transition: transform 120ms ease, background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        user-select: none;
      }
      .btn.icon {
        width: 38px;
        padding: 9px 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn:hover {
        background: var(--hover);
        transform: translateY(-1px);
      }
      @keyframes btnPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(48, 209, 88, 0.5); }
        50% { box-shadow: 0 0 0 8px rgba(48, 209, 88, 0); }
      }
      .btn.success-pulse {
        animation: btnPulse 0.8s ease;
      }
      .btn {
        transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
                    background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      }
      .btn:active {
        transform: scale(0.94);
      }
      .btn.primary {
        border-color: rgba(10, 132, 255, 0.55);
        background: rgba(10, 132, 255, 0.18);
      }
      .btn.danger {
        border-color: rgba(255, 69, 58, 0.55);
        background: rgba(255, 69, 58, 0.14);
      }
      .btn.ghost {
        background: transparent;
      }
      .main {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 14px;
        margin-top: 14px;
      }
      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        overflow: hidden;
        transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      }
      .panel-header {
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        transition: border-color 0.3s ease;
      }
      .panel-title {
        font-size: 13px;
        font-weight: 650;
        color: var(--text);
      }
      .panel-body {
        padding: 12px 14px 14px;
      }
      .search {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 999px;
        font-size: 12.5px;
        outline: none;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .search::placeholder { color: var(--placeholder); }
      .list {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-height: calc(100vh - 220px);
        overflow: auto;
        padding-right: 6px;
      }
      .list::-webkit-scrollbar { width: 10px; }
      .list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; transition: background 0.3s ease; }
      .item {
        position: relative;
        overflow: hidden;
        padding: 14px 14px;
        border: 1px solid var(--border);
        background: var(--item-bg);
        border-radius: var(--radius-sm);
        cursor: grab;
        transition: background 0.2s ease,
                    border-color 0.2s ease,
                    transform 0.15s ease,
                    box-shadow 0.2s ease,
                    opacity 0.2s ease;
        user-select: none;
      }
      .item-icon-bg {
        position: absolute;
        right: -16px;
        top: -16px;
        height: calc(100% + 32px);
        width: auto;
        opacity: 0.50;
        image-rendering: pixelated;
        pointer-events: none;
        z-index: 0;
      }
      .item:hover {
        background: var(--item-bg-hover);
        border-color: var(--border);
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .item:hover .item-icon-bg {
        opacity: 0.65 !important;
      }
      .item:active {
        transform: scale(0.98);
      }
      .item.active { 
        background: rgba(10, 132, 255, 0.16); 
        border-color: rgba(10, 132, 255, 0.42); 
        box-shadow: 0 0 0 1px rgba(10, 132, 255, 0.3);
      }
      .item.drag-over { 
        background: rgba(10, 132, 255, 0.18); 
        border-color: rgba(10, 132, 255, 0.6); 
        transform: scale(1.01);
        box-shadow: 0 4px 12px rgba(10, 132, 255, 0.2);
      }
      .item.entering {
        opacity: 0;
        transform: translateY(16px);
      }
      .item.removing {
        opacity: 0;
        transform: scale(0.9);
        transition: opacity 0.25s ease, transform 0.25s ease;
        pointer-events: none;
      }
      .item.dragging {
        opacity: 0.6;
        transform: scale(0.97);
        cursor: grabbing;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        z-index: 1000;
      }

      /* 拖动排序后的列表动画 */
      .list.just-reordered .item {
        animation: reorderSettle 0.45s cubic-bezier(0.23, 1.0, 0.32, 1);
      }

      @keyframes reorderSettle {
        0% { transform: scale(0.92); opacity: 0.7; }
        40% { transform: scale(1.03); }
        100% { transform: scale(1); opacity: 1; }
      }
      .item-top {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .item-title {
        flex: 1;
        min-width: 0;
        font-weight: 650;
        font-size: 12.5px;
        letter-spacing: 0.15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .badge {
        flex-shrink: 0;
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        background: var(--badge-bg);
        padding: 4px 8px;
        border-radius: 999px;
        white-space: nowrap;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .item-sub {
        position: relative;
        z-index: 1;
        margin-top: 6px;
        font-size: 11.5px;
        color: var(--muted);
        line-height: 1.35;
        transition: color 0.3s ease;
      }

      /* 规则匹配优先级徽章优化 */
      .match-hint {
        margin-left: 6px;
        font-size: 10px;
        padding: 1px 5px;
        border-radius: 4px;
        background: var(--badge-bg);
        border: 1px solid var(--border);
        color: var(--muted);
        vertical-align: middle;
      }
      .match-hint.high { background: rgba(48, 209, 88, 0.15); border-color: #30d158; color: #30d158; }
      .match-hint.medium { background: rgba(10, 132, 255, 0.12); border-color: #0a84ff; color: #0a84ff; }
      .match-hint.low { background: rgba(255, 69, 58, 0.1); border-color: #ff453a; color: #ff453a; }

      .badge.match-high { background: rgba(48, 209, 88, 0.18); border-color: #30d158; color: #30d158; }
      .badge.match-medium { background: rgba(10, 132, 255, 0.15); border-color: #0a84ff; color: #0a84ff; }
      .badge.match-low { background: rgba(255, 69, 58, 0.12); border-color: #ff453a; color: #ff453a; }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
      }
      .field {
        grid-column: span 12;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .field.half { grid-column: span 6; }
      .field.third { grid-column: span 4; }
      .label {
        font-size: 12px;
        color: var(--muted);
        transition: color 0.3s ease;
      }
      .input, .select, .textarea {
        border: 1px solid var(--border);
        background: var(--input-bg);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 13px;
        outline: none;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .input-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .input-row .input { flex: 1; }
      .iconbox {
        width: 24px;
        height: 24px;
        border-radius: 8px;
        border: 1px solid var(--icon-border);
        background: var(--icon-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        flex: 0 0 24px;
        transition: background 0.3s ease, border-color 0.3s ease;
      }
      .iconbox img {
        width: 24px;
        height: 24px;
        display: block;
        image-rendering: pixelated;
      }
      .textarea { min-height: 96px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; }
      .help {
        font-size: 11.5px;
        color: var(--muted-2);
        transition: color 0.3s ease;
      }
      .sep {
        height: 1px;
        background: var(--sep);
        margin: 12px 0;
        transition: background 0.3s ease;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .mini {
        font-size: 11.5px;
        color: var(--muted);
        transition: color 0.3s ease;
      }
      .chip {
        border: 1px solid var(--chip-border);
        background: var(--chip-bg);
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .chip.active {
        border-color: rgba(10, 132, 255, 0.55);
        background: rgba(10, 132, 255, 0.18);
      }
      @keyframes toastIn {
        0% { transform: translateY(50px); opacity: 0; }
        60% { transform: translateY(-6px); opacity: 1; }
        80% { transform: translateY(3px); }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes toastOut {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(20px); opacity: 0; }
      }
      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--toast-border);
        background: var(--toast-bg);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        font-size: 12.5px;
        color: var(--toast-text);
        max-width: 360px;
        opacity: 0;
        pointer-events: none;
        transform: translateY(50px);
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        z-index: 10002;
      }
      .toast.show {
        animation: toastIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        pointer-events: auto;
      }
      .toast.hide {
        animation: toastOut 0.3s ease forwards;
      }
      .toast.ok { border-color: rgba(48,209,88,0.40); }
      .toast.bad { border-color: rgba(255,69,58,0.45); }
      @media (max-width: 980px) {
        .main { grid-template-columns: 1fr; }
        .list { max-height: 280px; }
      }

      /* JSON Sidebar */
      .json-sidebar-toggle {
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-right: none;
        border-radius: 8px 0 0 8px;
        padding: 14px 7px;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #a0a0a0;
        cursor: pointer;
        z-index: 9999;
        user-select: none;
        transition: opacity 0.3s ease, background 0.2s ease, color 0.2s ease, padding 0.2s ease;
        box-shadow: -2px 0 8px rgba(0,0,0,0.3);
      }
      .json-sidebar-toggle:hover {
        background: #1a1d26;
        color: #fff;
        padding-right: 10px;
      }
      .json-sidebar {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        width: 420px;
        max-width: 45vw;
        background: #0f1117;
        border-left: 1px solid var(--border);
        box-shadow: -10px 0 30px rgba(0,0,0,0.6);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .json-sidebar.open { transform: translateX(0); }
      .json-sidebar-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #0b0d14;
        flex-shrink: 0;
      }
      .json-sidebar-header .title {
        font-weight: 600;
        font-size: 13px;
        color: var(--text);
      }
      .json-sidebar-header .actions {
        display: flex;
        gap: 6px;
      }
      .json-sidebar-header button {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--muted);
        cursor: pointer;
      }
      .json-sidebar-header button:hover {
        background: var(--panel-2);
        color: var(--text);
      }
      .json-sidebar-body {
        flex: 1;
        overflow: auto;
        padding: 12px 16px;
        font-size: 12.5px;
        line-height: 1.45;
        background: #0f1117;
      }
      .json-sidebar-body pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-all;
      }
      /* Basic JSON syntax highlight */
      .json-key { color: #9cdcfe; }
      .json-string { color: #ce9178; }
      .json-number { color: #b5cea8; }
      .json-boolean { color: #569cd6; font-weight: 500; }
      .json-bracket { color: #858585; }

      /* ===== 动态物品贴图背景 ===== */
      .bg-particles {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .bg-particle {
        position: absolute;
        filter: blur(4px) brightness(1.0);
        transition: opacity 0.8s ease;
      }
    </style>
  </head>
  <body>
    <div class="bg-particles" id="bgParticles"></div>
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <div class="brand-title" id="brandTitle"></div>
          <div class="brand-sub" id="subTitle"></div>
        </div>
        <div class="actions">
          <button class="btn ghost icon" id="btnTheme"></button>
          <button class="btn ghost icon" id="btnBgAnim" title="切换动态背景"></button>
          <button class="btn ghost" id="btnLang"></button>
          <input class="file" id="filePath" placeholder="" />
          <button class="btn" id="btnOpenFile"></button>
          <button class="btn ghost" id="btnReloadFromGame"></button>
          <button class="btn" id="btnRefresh"></button>
          <button class="btn" id="btnNew"></button>
          <button class="btn" id="btnDuplicate"></button>
          <button class="btn danger" id="btnDelete"></button>
          <button class="btn primary" id="btnSave"></button>
        </div>
      </div>

      <div class="main">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title" id="rulesPanelTitle"></div>
            <div class="mini" id="ruleCount">0</div>
          </div>
          <div class="panel-body">
            <input class="search" id="search" placeholder="" />
            <div class="list" id="list"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div class="panel-title" id="editorTitle"></div>
            <div class="mini" id="editorMeta"></div>
          </div>
          <div class="panel-body" id="editor"></div>
        </div>
      </div>
    </div>

    <!-- JSON Sidebar -->
    <div id="jsonSidebarToggle" class="json-sidebar-toggle" title="预览完整 JSON">JSON 预览</div>

    <div id="jsonSidebar" class="json-sidebar">
      <div class="json-sidebar-header">
        <div class="title">完整 JSON 预览 (可直接复制保存)</div>
        <div class="actions">
          <button id="jsonRefreshBtn">刷新</button>
          <button id="jsonCopyBtn">复制</button>
          <button id="jsonCloseBtn">关闭</button>
        </div>
      </div>
      <div class="json-sidebar-body">
        <pre><code id="jsonPreviewCode" style="color:#ddd;"></code></pre>
      </div>

      // ===== JSON Sidebar Logic =====
      function highlightJSON(jsonStr) {
        // Escape HTML
        let str = jsonStr
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        // Keys ( "key": )
        str = str.replace(/("([^"\\]|\\.)*"\s*:)/g, '<span class="json-key">$1</span>');

        // Strings
        str = str.replace(/("(?:[^"\\]|\\.)*")/g, (m, p1) => {
          if (p1.endsWith('":') || p1.endsWith('": ')) return p1; // already handled as key
          return '<span class="json-string">' + p1 + '</span>';
        });

        // Numbers
        str = str.replace(/\b(-?\d+(\.\d+)?([eE][+-]?\d+)?)\b/g, '<span class="json-number">$1</span>');

        // Booleans / null
        str = str.replace(/\b(true|false|null)\b/g, '<span class="json-boolean">$1</span>');

        // Brackets (optional)
        str = str.replace(/([{}\[\]])/g, '<span class="json-bracket">$1</span>');

        return str;
      }

      function getFullJson() {
        try {
          if (typeof toJsonRule !== 'function') {
            return { rules: state.rules };
          }
          return {
            rules: (state.rules || []).map(r => toJsonRule(r))
          };
        } catch (e) {
          return { error: "序列化失败: " + e.message, rules: state.rules };
        }
      }

      function updateJsonPreview() {
        const codeEl = $("jsonPreviewCode");
        if (!codeEl) return;

        const full = getFullJson();
        const pretty = JSON.stringify(full, null, 2);
        codeEl.innerHTML = highlightJSON(pretty);
      }

      function toggleJsonSidebar(forceOpen) {
        const sidebar = $("jsonSidebar");
        const toggle = $("jsonSidebarToggle");
        if (!sidebar) return;

        const isOpen = sidebar.classList.contains("open");

        if (forceOpen === true || (!isOpen && forceOpen !== false)) {
          sidebar.classList.add("open");
          if (toggle) toggle.style.opacity = "0.6";
          // 打开时立即刷新一次
          setTimeout(updateJsonPreview, 10);
        } else {
          sidebar.classList.remove("open");
          if (toggle) toggle.style.opacity = "1";
        }
      }

        const sidebar = $("jsonSidebar");
        const closeBtn = $("jsonCloseBtn");

        if (toggle) {
          toggle.onclick = () => toggleJsonSidebar();
        }

        if (closeBtn) closeBtn.onclick = () => toggleJsonSidebar(false);

        if (refreshBtn) {
          refreshBtn.onclick = () => updateJsonPreview();

      function currentLang() {

      }

      function t(key, ...args) {
        const dict = I18N[currentLang()];
        const path = String(key || "").split(".").filter(Boolean);
        let v = dict;
        for (const part of path) {
          if (v && typeof v === "object" && part in v) v = v[part];
          else { v = undefined; break; }
        }
        if (typeof v === "function") return v(...args);
        return v || "";
      }

      function detectDefaultLang() {
        const stored = localStorage.getItem(STORAGE_LANG);
        if (stored === "zh-CN" || stored === "en-US") return stored;
        const nav = (navigator.language || "").toLowerCase();
        if (nav.startsWith("zh")) return "zh-CN";
        return "en-US";
      }

      function detectDefaultThemePref() {
        const stored = localStorage.getItem(STORAGE_THEME);
        if (stored === "light" || stored === "dark" || stored === "system") return stored;
        return "system";
      }

      function getSystemTheme() {
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }

      // ===== 动态物品贴图背景 =====
      let bgParticlesSpawned = false;
      let bgParticlesRotationTimer = null;
      let bgPhysicsRaf = null;
      let bgPhysicsParticles = []; // { el, x, y, vx, vy, size, rot, omega }

      function spawnBgParticles() {
        const container = $("bgParticles");
        if (!container) return false;

        const candidates = [];
        if (state.iconCacheMap.size > 0) {
          for (const [, url] of state.iconCacheMap) {
            candidates.push(url);
          }
        }
        if (candidates.length === 0) return false;

        container.innerHTML = "";
        bgPhysicsParticles = [];

        const shuffledAll = [...candidates].sort(() => Math.random() - 0.5);
        const count = Math.min(10 + Math.floor(Math.random() * 9), shuffledAll.length);
        const vw = window.innerWidth, vh = window.innerHeight;

        // 创建粒子，初始位置用泊松盘采样避免重叠
        const placed = [];
        const minDist = 120; // 最小间距
        let attempts = 0;

        while (placed.length < count && attempts < count * 30) {
          attempts++;
          const size = 70 + Math.random() * 100;
          const x = size + Math.random() * (vw - size * 2);
          const y = size + Math.random() * (vh - size * 2);

          // 检查是否与已放置的粒子重叠
          let overlap = false;
          for (const o of placed) {
            const dx = x - o.x, dy = y - o.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < (size + o.size) / 2 + minDist * 0.4) { overlap = true; break; }
          }
          if (overlap) continue;

          const p = document.createElement("img");
          p.className = "bg-particle";
          p.src = shuffledAll[placed.length % shuffledAll.length];
          p.style.width = size + "px";
          p.style.height = size + "px";
          p.style.opacity = (0.10 + Math.random() * 0.14);
          p.style.left = "0";
          p.style.top = "0";
          p.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random() * 360}deg)`;
          p.onerror = () => { p.remove(); };
          container.appendChild(p);

          placed.push({ x, y, size });
          bgPhysicsParticles.push({
            el: p,
            x, y,
            vx: (Math.random() - 0.5) * 80,
            vy: (Math.random() - 0.5) * 80,
            size,
            rot: Math.random() * 360,
            omega: (Math.random() - 0.5) * 4
          });
        }

        // 物理循环
        if (bgPhysicsRaf) cancelAnimationFrame(bgPhysicsRaf);
        let lastT = performance.now();
        const tick = (now) => {
          if (!state.bgAnimEnabled) { lastT = now; bgPhysicsRaf = requestAnimationFrame(tick); return; }
          const dt = Math.min((now - lastT) / 1000, 0.1); // cap to 100ms
          lastT = now;
          const w = window.innerWidth, h = window.innerHeight;

          for (let i = 0; i < bgPhysicsParticles.length; i++) {
            const a = bgPhysicsParticles[i];
            // 移动
            a.x += a.vx * dt;
            a.y += a.vy * dt;
            a.rot += a.omega * dt;

            // 边界反弹
            const r = a.size / 2;
            if (a.x - r < 0) { a.x = r; a.vx *= -0.7; }
            if (a.x + r > w) { a.x = w - r; a.vx *= -0.7; }
            if (a.y - r < 0) { a.y = r; a.vy *= -0.7; }
            if (a.y + r > h) { a.y = h - r; a.vy *= -0.7; }

            // 粒子间碰撞（简化：推离 + 交换部分动量）
            for (let j = i + 1; j < bgPhysicsParticles.length; j++) {
              const b = bgPhysicsParticles[j];
              const dx = b.x - a.x, dy = b.y - a.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              const minD = (a.size + b.size) / 2;
              if (dist < minD && dist > 0.001) {
                // 推离重叠
                const overlap = (minD - dist) / 2;
                const nx = dx / dist, ny = dy / dist;
                a.x -= nx * overlap;
                a.y -= ny * overlap;
                b.x += nx * overlap;
                b.y += ny * overlap;
                // 交换径向速度分量
                const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
                const dvn = dvx * nx + dvy * ny;
                if (dvn > 0) {
                  a.vx -= dvn * nx * 0.5;
                  a.vy -= dvn * ny * 0.5;
                  b.vx += dvn * nx * 0.5;
                  b.vy += dvn * ny * 0.5;
                }
              }
            }

            // 阻尼
            a.vx *= 0.998;
            a.vy *= 0.998;

            // 同步 DOM
            a.el.style.transform = `translate(${a.x}px, ${a.y}px) rotate(${a.rot}deg)`;
            a.el.style.left = "0";
            a.el.style.top = "0";
          }
          bgPhysicsRaf = requestAnimationFrame(tick);
        };
        bgPhysicsRaf = requestAnimationFrame(tick);

        // 每 30 秒轮换图标（保留物理状态）
        if (bgParticlesRotationTimer) clearInterval(bgParticlesRotationTimer);
        bgParticlesRotationTimer = setInterval(() => {
          if (!state.bgAnimEnabled || bgPhysicsParticles.length === 0) return;
          const freshShuffled = [...candidates].sort(() => Math.random() - 0.5);
          bgPhysicsParticles.forEach(p => { p.el.style.opacity = "0"; });
          setTimeout(() => {
            bgPhysicsParticles.forEach((p, i) => {
              p.el.src = freshShuffled[i % freshShuffled.length];
              p.el.style.opacity = (0.10 + Math.random() * 0.14);
            });
          }, 800);
        }, 30000);

        bgParticlesSpawned = true;
        return true;
      }

      function modeLabel(mode) {

      /** 将 raw item ID 解析为友好名称（manifest 中的 displayName，否则返回原 ID） */
      function resolveDisplayName(rawId) {
        const id = String(rawId || "").trim();
        if (!id) return "";
        const dn = state.displayNameMap.get(id);
        return dn || id;
      }

      function summarizeRule(r) {
        const inParts = (r.inputs || []).map((i) => {
          let name = (i.value || "").trim();
          if (i.kind === "tag") {
            if (name && !name.startsWith("#")) name = "#" + name;
            // 缩短 tag 名：省略 minecraft: 命名空间
            name = name.replace(/^#minecraft:/, "#");
          } else if (i.kind === "item") {
            name = resolveDisplayName(name);
          }
          const count = Number(i.count || 1);
          return name + (count !== 1 ? "×" + count : "");
        }).filter(Boolean);

        const o = r.output || {};
        let outText = "";
        if (o.mode === "coin") outText = t("summaryCoin", Number(o.count || 0));
        else if (o.mode === "item") outText = resolveDisplayName((o.item || "").trim()) + "×" + Number(o.count || 1);
        else if (o.mode === "dynamic_pricing") {
          if (!o.coin && o.item) outText = "dynamic: " + resolveDisplayName((o.item || "").trim());
          else outText = t("summaryDynamicPricing", Boolean(o.coin));
        } else if (o.mode === "weight") outText = t("summaryWeight", (o.items || []).length);
        else if (o.mode === "ecliptic_seasons") {
          if (o.item) outText = resolveDisplayName((o.item || "").trim()) + " (seasons)";
          else outText = t("summarySeasons");
        } else outText = t("summaryOutput");

        return (inParts.join(" + ") || t("summaryEmpty")) + " → " + outText;
      }

      // 新增：计算规则的匹配清晰度（用于UI提示）
      function getInputMatchType(inp) {
        if (inp && inp.componentsText && String(inp.componentsText).trim()) return 'component';
        if (inp && inp.kind === 'item') return 'item';
        return 'tag';
      }

      function getRuleMatchInfo(r) {
        const inputs = (r && r.inputs) || [];
        if (inputs.length === 0) {
          return { level: 'low', label: '无输入条件', desc: '不会匹配任何物品' };
        }
        let hasComponent = false, hasExactItem = false;
        inputs.forEach(inp => {
          const t = getInputMatchType(inp);
          if (t === 'component') hasComponent = true;
          if (t === 'item') hasExactItem = true;
        });
        if (hasComponent) {
          return { level: 'high', label: '组件匹配（最高优先级）', desc: '有具体组件要求的规则会优先于普通物品/标签规则' };
        }
        if (hasExactItem) {
          return { level: 'medium', label: '精确物品匹配', desc: '指定具体物品的规则优先于标签规则' };
        }
        return { level: 'low', label: '标签匹配（通用）', desc: '使用标签的规则匹配范围最广，优先级最低' };
      }

      function parseMaybeJson(text) {
        const t = (text || "").trim();
        if (!t) return null;
        if (t.startsWith("{") || t.startsWith("[")) {
          try { return JSON.parse(t); } catch (_) { return t; }
        }
        return t;
      }

      function qualityFoodComponent(value) {
        if (value === "diamond") return { level: 3, type: "quality_food:diamond" };
        if (value === "gold") return { level: 2, type: "quality_food:gold" };
        if (value === "iron") return { level: 1, type: "quality_food:iron" };
        return null;
      }

      function componentsObjectFromText(text) {
        const parsed = parseMaybeJson(text);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
          return parsed;
        }
        return null;
      }

      function mergeComponentTemplate(currentText, newJson) {
        const base = componentsObjectFromText(currentText) || {};
        const merged = Object.assign({}, base, (newJson && typeof newJson === "object" ? newJson : {}));
        const keys = Object.keys(merged);
        if (keys.length === 0) return "";
        return JSON.stringify(merged, null, 2);
      }

      function removeComponentKeys(currentText, keys) {
        const base = componentsObjectFromText(currentText) || {};
        for (const k of (Array.isArray(keys) ? keys : [])) {
          delete base[k];
        }
        const left = Object.keys(base);
        if (left.length === 0) return "";
        return JSON.stringify(base, null, 2);
      }

      function removeComponentKey(currentText, key) {
        const base = componentsObjectFromText(currentText) || {};
        delete base[key];
        const keys = Object.keys(base);
        if (keys.length === 0) return "";
        return JSON.stringify(base, null, 2);
      }

      function getQualityFoodFromComponentsText(text) {
        const obj = componentsObjectFromText(text);
        if (!obj) return "normal";
        const q = obj["quality_food:quality"];
        if (!q || typeof q !== "object") return "normal";
        const type = String(q.type || "");
        if (type === "quality_food:diamond") return "diamond";
        if (type === "quality_food:gold") return "gold";
        if (type === "quality_food:iron") return "iron";
        return "normal";
      }

      function setQualityFoodInComponentsText(text, quality) {
        if (quality === "normal") {
          return removeComponentKey(text, "quality_food:quality");
        } else {
          const q = qualityFoodComponent(quality);
          if (q) return mergeComponentTemplate(text, { "quality_food:quality": q });
        }
        return String(text || "");
      }

        function startEdit(idx) {
          const item = pending[idx];
          if (!item) return;
          editingIndex = idx;
          addThisBtn.textContent = "更新此组件";
          const type = item.type || "custom";
          modSelect.dataset.value = type;
          setValue(type);
          renderForm(type);

          // 尝试填充表单值 (简单反向填充)
          setTimeout(() => {
            const comp = item.comp;
            const key = Object.keys(comp)[0];
            const val = comp[key];
            const selVal = modSelect.dataset.value || "";
            if (selVal === "quality_food" && key.includes("quality")) {
              const level = val && val.type ? (val.type.includes("diamond") ? "diamond" : val.type.includes("gold") ? "gold" : val.type.includes("iron") ? "iron" : "normal") : "diamond";
              if (formArea._setQuality) {
                formArea._setQuality(level);
              } else {
                // fallback
                const chips = formArea.querySelectorAll(".chip");
                chips.forEach(c => c.classList.toggle("active", c.textContent.includes(level === "diamond" ? "钻石" : level === "gold" ? "金" : level === "iron" ? "铁" : "普通")));
              }
            } else if ((selVal === "tide_length" || selVal === "tide_time") && typeof val === "string") {
              const match = val.match(/\[?([0-9.]+),([0-9.]+)/);
              if (match && formArea.querySelector("input")) {
                formArea.querySelector("input").value = `${match[1]},${match[2]}`;
              }
            } else if (selVal === "brew_level" && formArea.querySelector("input")) {
              formArea.querySelector("input").value = val || 7;
            } else if (selVal === "potion" && val && val.potion && formArea.querySelector("input")) {
              formArea.querySelector("input").value = val.potion;
            } else if (selVal === "enchant" && val && val.levels) {
              const encInput = formArea.querySelector("input");
              const lvlInput = formArea.querySelectorAll("input")[1];
              const firstKey = Object.keys(val.levels)[0];
              if (encInput) encInput.value = firstKey || "";
              if (lvlInput) lvlInput.value = val.levels[firstKey] || 1;
            } else if (selVal === "damage" && formArea.querySelector("input")) {
              formArea.querySelector("input").value = val || 100;
            } else if (selVal === "custom_name" && formArea.querySelector("input")) {
              formArea.querySelector("input").value = val ? val.replace(/^"|"$/g, "") : "";
            } else if (selVal === "custom" ) {
              const inputs = formArea.querySelectorAll("input");
              if (inputs[0]) inputs[0].value = key;
              if (inputs[1]) inputs[1].value = typeof val === "object" ? JSON.stringify(val) : val;
            }
          }, 50);
        }

        addThisBtn.onclick = () => {
          if (!formArea._getValue) return;
          const newComp = formArea._getValue();
          if (!newComp || Object.keys(newComp).length === 0) return;

          const currentType = modSelect.dataset.value || "";

          if (editingIndex >= 0) {
            // 更新模式
            pending[editingIndex] = { type: currentType, comp: newComp };
            editingIndex = -1;
            addThisBtn.textContent = "添加此组件";
            toast("已更新组件", "ok");
          } else {
            pending.push({ type: currentType, comp: newComp });
            toast("已添加到列表，可继续选择其他组件", "ok");
          }
          renderAdded();
          // 重置表单
          modSelect.dataset.value = "";
          setValue("");
          formArea.innerHTML = "";
        };

        applyAllBtn.onclick = () => {
          if (pending.length === 0) {
            toast("请先添加至少一个组件", "bad");
            return;
          }
          let current = getCurrentText();
          pending.forEach(p => {
            current = mergeComponentTemplate(current, p.comp);
          });
          onApply(current);
          container.remove();
          toast(`已应用 ${pending.length} 个组件`, "ok");
        };

        cancelBtn.onclick = () => {
          container.remove();
        };

        return container;
      }

      function parseIntList(text) {
        const parts = String(text || "")
          .split(/[\s,]+/g)
          .map((s) => s.trim())
          .filter(Boolean);
        const nums = [];
        for (const p of parts) {
          const n = Number(p);
          if (!Number.isFinite(n)) continue;
          nums.push(Math.trunc(n));
        }
        return nums;
      }

      function fromJsonRule(rule, idx) {
        const id = "r_" + (Date.now().toString(36)) + "_" + idx + "_" + Math.random().toString(16).slice(2);
        const inputRaw = rule.input;
        const inputsArr = Array.isArray(inputRaw) ? inputRaw : (inputRaw ? [inputRaw] : []);
        const inputs = inputsArr.map((i) => ({
          kind: i.tag ? "tag" : "item",
          value: i.tag ? (String(i.tag || "").startsWith("#") ? String(i.tag) : ("#" + String(i.tag || ""))) : (i.item || ""),
          count: Number(i.count || 1),
          componentsText: (typeof i.components === "object") ? JSON.stringify(i.components, null, 2) : (i.components || "")
        }));

        const out = rule.output || {};
        let output = { mode: "item", item: "", count: 1, componentsText: "" };
        if (out.type === "dynamic_pricing") {
          output = {
            mode: "dynamic_pricing",
            coin: Boolean(out.coin),
            item: out.item || "",
            day: out.dynamic_properties && Number.isFinite(Number(out.dynamic_properties.day)) ? Number(out.dynamic_properties.day) : 0,
            thresholdText: out.dynamic_properties && Array.isArray(out.dynamic_properties.threshold) ? out.dynamic_properties.threshold.join(", ") : "",
            valueText: out.dynamic_properties && Array.isArray(out.dynamic_properties.value) ? out.dynamic_properties.value.join(", ") : ""
          };
        } else if (out.type === "weight") {
          output = {
            mode: "weight",
            items: (out.items || []).map((w) => ({
              item: w.item || "",
              count: Number(w.count || 1),
              weight: Number(w.weight || 1),
              componentsText: (typeof w.components === "object") ? JSON.stringify(w.components, null, 2) : (w.components || "")
            }))
          };
        } else if (out.type === "ecliptic_seasons") {
          const ecs = out.ecliptic_seasons || {};
          output = {
            mode: "ecliptic_seasons",
            item: out.item || "",
            count: Number(out.count || 1),
            componentsText: (typeof out.components === "object") ? JSON.stringify(out.components, null, 2) : (out.components || ""),
            seasonalOnly: Boolean(ecs.seasonal_only),
            seasonText: Array.isArray(ecs.season) ? ecs.season.join(", ") : "",
            addBonus: Number.isFinite(Number(ecs.add_season_bonus)) ? Number(ecs.add_season_bonus) : 0,
            reduceBonus: Number.isFinite(Number(ecs.reduce_season_bonus)) ? Number(ecs.reduce_season_bonus) : 0
          };
        } else if (out.coin) {
          output = { mode: "coin", count: Number(out.count || 0) };
        } else {
          output = {
            mode: "item",
            item: out.item || "",
            count: Number(out.count || 1),
            componentsText: (typeof out.components === "object") ? JSON.stringify(out.components, null, 2) : (out.components || "")
          };
        }

        return { id, inputs, output };
      }

      function toJsonRule(model) {
        const input = (model.inputs || []).map((i) => {
          const obj = { count: Math.max(1, Math.trunc(Number(i.count || 1))) };
          const value = (i.value || "").trim();
          if (i.kind === "tag") obj.tag = value.startsWith("#") ? value : ("#" + value);
          else obj.item = value;
          const comp = parseMaybeJson(i.componentsText);
          if (comp !== null && comp !== "") obj.components = comp;
          return obj;
        });

        const o = model.output || {};
        let output = {};
        if (o.mode === "coin") {
          output = { coin: true, count: Math.max(0, Math.trunc(Number(o.count || 0))) };
        } else if (o.mode === "dynamic_pricing") {
          output = {
            type: "dynamic_pricing",
            dynamic_properties: {
              threshold: parseIntList(o.thresholdText),
              value: parseIntList(o.valueText),
              day: Math.trunc(Number(o.day || 0))
            }
          };
          if (o.coin) output.coin = true;
          else output.item = (o.item || "").trim();
        } else if (o.mode === "weight") {
          output = {
            type: "weight",
            items: (o.items || []).map((w) => {
              const itemObj = {
                item: (w.item || "").trim(),
                count: Math.max(1, Math.trunc(Number(w.count || 1))),
                weight: Math.max(1, Math.trunc(Number(w.weight || 1)))
              };
              const comp = parseMaybeJson(w.componentsText);
              if (comp !== null && comp !== "") itemObj.components = comp;
              return itemObj;
            })
          };
        } else if (o.mode === "ecliptic_seasons") {
          output = {
            type: "ecliptic_seasons",
            item: (o.item || "").trim(),
            count: Math.max(1, Math.trunc(Number(o.count || 1))),
            ecliptic_seasons: {
              season: String(o.seasonText || "").split(/[\s,]+/g).map((s) => s.trim()).filter(Boolean),
              seasonal_only: Boolean(o.seasonalOnly),
              add_season_bonus: Math.trunc(Number(o.addBonus || 0)),
              reduce_season_bonus: Math.trunc(Number(o.reduceBonus || 0))
            }
          };
          const comp = parseMaybeJson(o.componentsText);
          if (comp !== null && comp !== "") output.components = comp;
        } else {
          output = {
            item: (o.item || "").trim(),
            count: Math.max(1, Math.trunc(Number(o.count || 1)))
          };
          const comp = parseMaybeJson(o.componentsText);
          if (comp !== null && comp !== "") output.components = comp;
        }

        return { input, output };
      }

      function selectedRule() {
        return state.rules.find((r) => r.id === state.selectedId) || null;
      }

      function setSelected(id) {
        const prev = state.selectedId;
        state.selectedId = id;
        if (state.listCache) {
          if (prev) state.listCache.dirtyIds.add(prev);
          if (id) state.listCache.dirtyIds.add(id);
        }
        render();
      }

      function getRuleIconId(r) {
        const o = r.output || {};
        if (o.mode === "item" && o.item) return { id: String(o.item), type: "item" };
        if (o.mode === "ecliptic_seasons" && o.item) return { id: String(o.item), type: "item" };
        if (o.mode === "dynamic_pricing" && !o.coin && o.item) return { id: String(o.item), type: "item" };
        // 优先取第一个物品输入，其次取第一个 tag 输入
        const inItem = (r.inputs || []).find((i) => i && i.kind === "item" && i.value);
        if (inItem) return { id: String(inItem.value), type: "item" };
        const inTag = (r.inputs || []).find((i) => i && i.kind === "tag" && i.value);
        if (inTag) {
          const v = String(inTag.value).trim();
          return { id: v.startsWith("#") ? v : ("#" + v), type: "tag" };
        }
        return null;
      }

      /** 根据 icon 信息获取实际 URL（item 或 tag） */
      function resolveIconUrl(iconInfo) {
        if (!iconInfo) return null;
        if (iconInfo.type === "tag" && state.tagIconMap.has(iconInfo.id)) {
          return state.tagIconMap.get(iconInfo.id);
        }
        if (state.iconCacheReady && state.iconCacheMap.has(iconInfo.id)) {
          return state.iconCacheMap.get(iconInfo.id);
        }
        return null;
      }

      function ensureListStructure() {
        const list = $("list");
        if (!list) return null;
        if (list.dataset.vlist === "1") {
          return { list, top: document.getElementById("listTopSpacer"), host: document.getElementById("listItemsHost"), bottom: document.getElementById("listBottomSpacer") };
        }
        list.dataset.vlist = "1";
        list.style.position = "relative";
        list.innerHTML = "";
        const top = document.createElement("div");
        top.id = "listTopSpacer";
        const host = document.createElement("div");
        host.id = "listItemsHost";
        host.style.display = "flex";
        host.style.flexDirection = "column";
        host.style.gap = "16px";
        const bottom = document.createElement("div");
        bottom.id = "listBottomSpacer";
        list.appendChild(top);
        list.appendChild(host);
        list.appendChild(bottom);
        list.addEventListener("scroll", () => requestListViewport(false));
        return { list, top, host, bottom };
      }

      function requestListViewport(force) {
        const cache = state.listCache;
        if (force) cache.forceNext = true;
        if (cache.raf) return;
        cache.raf = requestAnimationFrame(() => {
          cache.raf = null;
          renderListViewport(cache.forceNext);
          cache.forceNext = false;
        });
      }

      function buildRuleListItem(r, idx) {
        const el = document.createElement("div");
        el.className = "item entering" + (r.id === state.selectedId ? " active" : "");
        el.dataset.id = r.id;
        // 交错入场
        el.style.transition = "opacity 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)";
        el.style.transitionDelay = ((idx || 0) * 0.04) + "s";
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            el.classList.remove("entering");
          });
        });
        el.onclick = () => setSelected(r.id);
        el.draggable = true;

        // 左侧背景图标（半透明像素风）
        const bgImg = document.createElement("img");
        bgImg.className = "item-icon-bg";
        bgImg.alt = "";
        bgImg.dataset.role = "ruleIconBg";
        bgImg.src = TRANSPARENT_IMG;
        el.appendChild(bgImg);
        el.addEventListener("dragstart", (e) => {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", r.id);
          el.classList.add("dragging");
        });
        el.addEventListener("dragend", () => {
          el.classList.remove("dragging");
        });
        el.addEventListener("dragover", (e) => {
          e.preventDefault();
          el.classList.add("drag-over");
        });
        el.addEventListener("dragleave", () => {
          el.classList.remove("drag-over");
        });
        el.addEventListener("drop", (e) => {
          e.preventDefault();
          el.classList.remove("drag-over");
          const dragId = e.dataTransfer.getData("text/plain");
          moveRuleBefore(dragId, r.id);
        });

        const top = document.createElement("div");
        top.className = "item-top";

        const left = document.createElement("div");
        left.style.display = "flex";
        left.style.alignItems = "center";
        left.style.gap = "8px";

        // 拖动把手提示
        const grip = document.createElement("div");
        grip.textContent = "⋮⋮";
        grip.style.fontSize = "14px";
        grip.style.color = "var(--muted)";
        grip.style.cursor = "grab";
        grip.style.paddingRight = "6px";
        grip.style.opacity = "0.5";
        grip.style.lineHeight = "1";
        grip.style.userSelect = "none";
        grip.style.transition = "opacity 0.2s ease, color 0.2s ease";
        grip.onmouseenter = () => { grip.style.opacity = "1"; grip.style.color = "var(--accent)"; };
        grip.onmouseleave = () => { grip.style.opacity = "0.5"; grip.style.color = "var(--muted)"; };
        left.appendChild(grip);

        const titleDiv = document.createElement("div");
        titleDiv.className = "item-title";
        titleDiv.dataset.role = "ruleTitle";
        left.appendChild(titleDiv);

        const badge = document.createElement("div");
        badge.className = "badge";
        badge.dataset.role = "ruleBadge";

        top.appendChild(left);
        top.appendChild(badge);

        const sub = document.createElement("div");
        sub.className = "item-sub";
        sub.dataset.role = "ruleSub";

        const actions = document.createElement("div");
        actions.className = "row";
        actions.style.marginTop = "10px";
        const dup = document.createElement("div");
        dup.className = "chip";
        dup.textContent = t("btnDuplicate");
        dup.onclick = (ev) => {
          ev.stopPropagation();
          const copy = JSON.parse(JSON.stringify(r));
          copy.id = "r_" + Date.now().toString(36) + "_" + Math.random().toString(16).slice(2);
          const idx = state.rules.findIndex(x => x.id === r.id);
          state.rules.splice(idx + 1, 0, copy);
          state.rulesVersion++;
          state.selectedId = copy.id;
          scheduleRenderList();
          renderEditor();
        };
        const del = document.createElement("div");
        del.className = "chip";
        del.textContent = t("btnDelete");
        del.onclick = (ev) => {
          ev.stopPropagation();
          el.classList.add("removing");
          setTimeout(() => {
            const idx = state.rules.findIndex(x => x.id === r.id);
            if (idx >= 0) state.rules.splice(idx, 1);
            state.rulesVersion++;
            state.selectedId = state.rules.length ? state.rules[Math.min(idx, state.rules.length - 1)].id : null;
            scheduleRenderList();
            renderEditor();
          }, 250);
        };
        actions.appendChild(dup);
        actions.appendChild(del);

        el.appendChild(top);
        el.appendChild(sub);
        el.appendChild(actions);
        updateRuleListItem(el, r);
        return el;
      }

      function updateRuleListItem(el, r) {
        if (!el || !r) return;
        el.classList.toggle("active", r.id === state.selectedId);
        const title = el.querySelector('[data-role="ruleTitle"]');
        if (title) title.textContent = summarizeRule(r);

        const badge = el.querySelector('[data-role="ruleBadge"]');
        const matchInfo = getRuleMatchInfo(r);
        if (badge) {
          badge.textContent = r.output && r.output.mode ? modeLabel(r.output.mode) : t("badgeRule");
          // 添加匹配优先级样式类
          badge.className = 'badge match-' + matchInfo.level;
        }

        const sub = el.querySelector('[data-role="ruleSub"]');
        if (sub) {
          const info = matchInfo;
          sub.innerHTML = t("itemSub", (r.inputs || []).length) + 
            ` <span class="match-hint ${info.level}">${info.label}</span>`;
        }

        // 背景图标：左侧半透明物品/tag 图标
        const bgImg = el.querySelector('img[data-role="ruleIconBg"]');
        if (bgImg) {
          const iconInfo = getRuleIconId(r);
          const url = resolveIconUrl(iconInfo);
          if (url) {
            bgImg.src = url;
            bgImg.style.display = "";
          } else {
            bgImg.src = TRANSPARENT_IMG;
          }
        }
      }

      function moveRuleBefore(dragId, targetId) {
        if (!dragId || !targetId || dragId === targetId) return;
        const from = state.rules.findIndex(x => x.id === dragId);
        const to = state.rules.findIndex(x => x.id === targetId);
        if (from < 0 || to < 0) return;
        const [item] = state.rules.splice(from, 1);
        const insertAt = from < to ? to - 1 : to;
        state.rules.splice(insertAt, 0, item);
        state.rulesVersion++;

        // 拖动排序后的小动画提示
        scheduleRenderList();

        // 延迟添加一个临时高亮动画
        setTimeout(() => {
          const list = $("list");
          if (list) {
            list.classList.add("just-reordered");
            setTimeout(() => list.classList.remove("just-reordered"), 600);
          }
        }, 50);
      }

      function renderListViewport(force) {
        const parts = ensureListStructure();
        if (!parts) return;
        const { list, top, host, bottom } = parts;
        const cache = state.listCache;
        const view = cache.view || [];
        const total = view.length;
        const rowH = Math.max(48, Math.trunc(cache.rowH || 104));
        const overscan = 6;
        const scrollTop = list.scrollTop || 0;
        const vh = list.clientHeight || 0;
        let start = Math.floor(scrollTop / rowH) - overscan;
        let end = Math.ceil((scrollTop + vh) / rowH) + overscan;
        if (start < 0) start = 0;
        if (end > total) end = total;
        const sameRange = cache.range.start === start && cache.range.end === end;
        if (!force && sameRange && cache.dirtyIds.size === 0) return;
        cache.range = { start, end };

        const nextEls = new Map();
        const frag = document.createDocumentFragment();
        for (let i = start; i < end; i++) {
          const r = view[i];
          const el = buildRuleListItem(r, i);
          nextEls.set(r.id, el);
          frag.appendChild(el);
        }

        host.innerHTML = "";
        host.appendChild(frag);
        cache.renderedEls = nextEls;
        top.style.height = (start * rowH) + "px";
        bottom.style.height = ((total - end) * rowH) + "px";

        if (!cache.measured && host.firstElementChild) {
          requestAnimationFrame(() => {
            const h = host.firstElementChild.getBoundingClientRect().height;
            if (h && Number.isFinite(h) && h >= 60 && h <= 220) {
              cache.rowH = Math.round(h + 8);
              cache.measured = true;
              requestListViewport(true);
            } else {
              cache.measured = true;
            }
          });
        }

        if (cache.dirtyIds.size) cache.dirtyIds.clear();
      }

      function renderList() {
        const cache = state.listCache;
        const q = state.filter.trim().toLowerCase();
        const needRecalc = cache.version !== state.rulesVersion || cache.filter !== q;
        if (needRecalc) {
          cache.byId = new Map(state.rules.map((r) => [r.id, r]));
          cache.filter = q;
          cache.version = state.rulesVersion;
          cache.measured = false;
          cache.view = state.rules.filter((r) => {
            if (!q) return true;
            const text = summarizeRule(r).toLowerCase();
            const type = (r.output && r.output.mode) ? String(r.output.mode) : "";
            return text.includes(q) || type.includes(q);
          });
          cache.dirtyIds.clear();
        }

        $("ruleCount").textContent = String(cache.view.length);
        requestListViewport(needRecalc);
        if (!needRecalc && cache.dirtyIds.size) requestListViewport(false);
      }

      function escapeHtml(s) {
        return String(s || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function isValidNamespaceId(value) {
        return /^[a-z0-9_.-]+:[a-z0-9_./-]+$/.test(String(value || "").trim());
      }

      function iconUrl(id) {
        return "/api/icon?token=" + encodeURIComponent(token) + "&id=" + encodeURIComponent(id);
      }

      function createIconBox() {
        const box = document.createElement("div");
        box.className = "iconbox";
        const img = document.createElement("img");
        img.alt = "";
        img.decoding = "async";
        img.src = TRANSPARENT_IMG;
        img.onerror = () => { img.src = TRANSPARENT_IMG; };
        box.appendChild(img);
        return { box, img };
      }

      function updateIconForValue(img, value) {
        const v = String(value || "").trim();
        if (!isValidNamespaceId(v)) {
          img.src = TRANSPARENT_IMG;
          return;
        }

        // Prefer disk cache if available (much faster, no on-the-fly extraction)
        if (state.iconCacheReady && state.iconCacheMap.has(v)) {
          img.src = state.iconCacheMap.get(v);
          return;
        }

        if (!state.registryItemsSet || !state.registryItemsSet.has(v)) {
          img.src = iconUrl("minecraft:barrier");
          return;
        }
        img.src = iconUrl(v);
      }

      /** tag 输入框：根据 tagIconMap 显示对应图标 */
      function bindTagIcon(input, img) {
        const update = () => {
          const v = String(input.value || "").trim();
          const tagId = v.startsWith("#") ? v : ("#" + v);
          const url = state.tagIconMap.get(tagId);
          if (url) {
            img.src = url;
          } else {
            img.src = TRANSPARENT_IMG;
          }
        };
        input.addEventListener("input", update);
        update();
      }

      function bindDebouncedIcon(input, img) {
        let timer = null;
        const update = () => updateIconForValue(img, input.value);
        input.addEventListener("input", () => {
          if (timer) clearTimeout(timer);
          timer = setTimeout(update, 300);
        });
        update();
      }

      const ac = {
        layer: null,
        input: null,
        type: null,
        items: [],
        index: -1,
        hideTimer: null
      };

      function ensureAutocompleteLayer() {
        if (ac.layer) return ac.layer;
        const layer = document.createElement("div");
        layer.id = "acLayer";
        layer.style.display = "none";
        layer.style.position = "absolute";
        layer.style.zIndex = "9999";
        layer.style.minWidth = "240px";
        layer.style.maxWidth = "520px";
        layer.style.maxHeight = "320px";
        layer.style.overflow = "auto";
        layer.style.padding = "6px";
        layer.style.borderRadius = "14px";
        layer.style.border = "1px solid var(--border)";
        layer.style.background = "var(--panel-2)";
        layer.style.boxShadow = "var(--shadow)";
        layer.style.backdropFilter = "blur(18px)";
        layer.style.userSelect = "none";
        layer.style.transition = "opacity 0.15s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease";

        layer.addEventListener("mousedown", (e) => {
          e.preventDefault();
        });

        document.body.appendChild(layer);
        ac.layer = layer;

        const reposition = () => {
          if (!ac.input || !ac.layer || ac.layer.style.display === "none") return;
          const rect = ac.input.getBoundingClientRect();
          ac.layer.style.left = (window.scrollX + rect.left) + "px";
          ac.layer.style.top = (window.scrollY + rect.bottom + 6) + "px";
          ac.layer.style.minWidth = rect.width + "px";
        };

        window.addEventListener("scroll", reposition, true);
        window.addEventListener("resize", reposition);
        return layer;
      }

      function hideAutocompleteNow() {
        if (ac.hideTimer) clearTimeout(ac.hideTimer);
        ac.hideTimer = null;
        if (ac.layer) {
          ac.layer.style.opacity = "0";
          ac.layer.style.transform = "scale(0.95) translateY(-6px)";
          const l = ac.layer;
          setTimeout(() => { l.style.display = "none"; }, 150);
        }
        ac.input = null;
        ac.type = null;
        ac.items = [];
        ac.index = -1;
      }

      function scheduleHideAutocomplete() {
        if (ac.hideTimer) clearTimeout(ac.hideTimer);
        ac.hideTimer = setTimeout(() => hideAutocompleteNow(), 120);
      }

      function normalizeTagId(v) {
        const s = String(v || "").trim();
        return s.startsWith("#") ? s.slice(1) : s;
      }

      function formatTagValue(v) {
        const s = String(v || "").trim();
        if (!s) return "";
        return s.startsWith("#") ? s : ("#" + s);
      }

      function getSuggestions(type, query) {
        const q = String(query || "").trim().toLowerCase();
        if (type === "tag") {
          const qn = normalizeTagId(q);
          const src = Array.isArray(state.registry.tags) ? state.registry.tags : [];
          const out = [];
          for (const raw of src) {
            const id = normalizeTagId(raw);
            const hay = id.toLowerCase();
            if (!qn || hay.includes(qn)) {
              const iconId = state.tagIconMap.get(formatTagValue(id)) || "";
              out.push({ type: "tag", value: formatTagValue(id), label: formatTagValue(id), iconId: iconId });
              if (out.length >= 60) break;
            }
          }
          return out;
        }
        // item 类型：优先用 manifest 中的 displayName，并支持按 displayName 搜索
        const src = Array.isArray(state.registry.items) ? state.registry.items : [];
        const exact = [];  // query is prefix of displayName or id
        const fuzzy = [];  // query appears anywhere in displayName or id
        for (const id of src) {
          const idLower = String(id || "").toLowerCase();
          const dn = state.displayNameMap.get(id) || "";
          const dnLower = dn.toLowerCase();
          const matchId = idLower.includes(q);
          const matchDn = dnLower.includes(q);
          if ((!q) || matchId || matchDn) {
            const label = dn || String(id);
            const entry = { type: "item", value: String(id), label: label, iconId: String(id) };
            // query 是 displayName 或 id 的前缀 → 优先
            if (q && (dnLower.startsWith(q) || idLower.startsWith(q))) {
              exact.push(entry);
            } else {
              fuzzy.push(entry);
            }
            if (exact.length + fuzzy.length >= 60) break;
          }
        }
        return exact.concat(fuzzy);
      }

      function renderAutocomplete() {
        const layer = ensureAutocompleteLayer();
        layer.innerHTML = "";
        for (let i = 0; i < ac.items.length; i++) {
          const it = ac.items[i];
          const row = document.createElement("div");
          row.className = "item";
          row.style.display = "flex";
          row.style.alignItems = "center";
          row.style.gap = "10px";
          row.style.padding = "10px 10px";
          row.style.margin = "0";
          row.style.cursor = "pointer";
          row.style.borderRadius = "12px";
          row.style.border = "1px solid transparent";
          row.style.background = (i === ac.index) ? "var(--hover)" : "transparent";
          row.addEventListener("mouseenter", () => {
            ac.index = i;
            renderAutocomplete();
          });
          row.addEventListener("click", () => {
            applyAutocompleteSelection(i);
          });

          if (it.type === "tag") {
            if (it.iconId) {
              const { box, img } = createIconBox();
              img.src = it.iconId;
              row.appendChild(box);
            } else {
              const badge = document.createElement("div");
              badge.className = "badge";
              badge.textContent = "#";
              row.appendChild(badge);
            }
          } else {
            const { box, img } = createIconBox();
            updateIconForValue(img, it.iconId);
            row.appendChild(box);
          }

          const text = document.createElement("div");
          text.style.flex = "1";
          text.style.minWidth = "0";
          text.style.fontSize = "12.5px";
          text.style.whiteSpace = "nowrap";
          text.style.overflow = "hidden";
          text.style.textOverflow = "ellipsis";
          text.textContent = it.label;
          row.appendChild(text);

          layer.appendChild(row);
        }

        if (!ac.items.length) {
          const empty = document.createElement("div");
          empty.className = "help";
          empty.style.padding = "10px 10px";
          empty.textContent = "—";
          layer.appendChild(empty);
        }
      }

      function showAutocomplete(input, type) {
        if (!input) return;
        const layer = ensureAutocompleteLayer();
        ac.input = input;
        ac.type = type;
        ac.items = getSuggestions(type, input.value);
        ac.index = ac.items.length ? 0 : -1;
        renderAutocomplete();

        const rect = input.getBoundingClientRect();
        layer.style.left = (window.scrollX + rect.left) + "px";
        layer.style.top = (window.scrollY + rect.bottom + 6) + "px";
        layer.style.minWidth = rect.width + "px";
        // 入场动画
        layer.style.display = "block";
        layer.style.opacity = "0";
        layer.style.transform = "scale(0.95) translateY(-6px)";
        requestAnimationFrame(() => {
          layer.style.opacity = "1";
          layer.style.transform = "scale(1) translateY(0)";
        });
      }

      function applyAutocompleteSelection(index) {
        if (!ac.input) return;
        const it = ac.items[index];
        if (!it) return;
        const input = ac.input;
        input.value = it.value;
        input.dispatchEvent(new Event("input", { bubbles: true }));
        hideAutocompleteNow();
        input.focus();
      }

      function attachAutocomplete(input, type) {
        if (!input) return;
        input.setAttribute("autocomplete", "off");
        input.addEventListener("focus", () => showAutocomplete(input, type));
        input.addEventListener("input", () => showAutocomplete(input, type));
        input.addEventListener("blur", () => scheduleHideAutocomplete());
        input.addEventListener("keydown", (e) => {
          if (!ac.layer || ac.layer.style.display === "none" || ac.input !== input) return;
          if (e.key === "ArrowDown") {
            e.preventDefault();
            ac.index = Math.min(ac.items.length - 1, ac.index + 1);
            renderAutocomplete();
            ensureAutocompleteLayer().children[ac.index]?.scrollIntoView({ block: "nearest" });
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            ac.index = Math.max(0, ac.index - 1);
            renderAutocomplete();
            ensureAutocompleteLayer().children[ac.index]?.scrollIntoView({ block: "nearest" });
          } else if (e.key === "Enter") {
            if (ac.index >= 0) {
              e.preventDefault();
              applyAutocompleteSelection(ac.index);
            }
          } else if (e.key === "Escape") {
            e.preventDefault();
            hideAutocompleteNow();
          }
        });
      }

        return row;

      /** 自定义下拉选择器，风格与整体 UI 一致 */
      function customSelect(options, currentValue, onChange) {
        const el = document.createElement("div");
        el.className = "input";
        el.style.position = "relative";
        el.style.cursor = "pointer";
        el.style.display = "flex";
        el.style.alignItems = "center";
        el.style.justifyContent = "space-between";
        el.style.userSelect = "none";

        const label = document.createElement("span");
        const arrow = document.createElement("span");
        arrow.textContent = "▾";
        arrow.style.fontSize = "10px";
        arrow.style.opacity = "0.5";
        arrow.style.transition = "transform 0.2s ease";

        const setLabel = (val) => {
          const opt = options.find(o => o.value === val);
          label.textContent = opt ? opt.label : (options[0] ? options[0].label : "");
          label.style.opacity = val ? "1" : "0.45";
        };
        setLabel(currentValue);
        el.appendChild(label);
        el.appendChild(arrow);

        let open = false;
        let layer = null;

        const reposition = () => {
          if (!layer) return;
          const r = el.getBoundingClientRect();
          layer.style.left = r.left + "px";
          layer.style.top = (r.bottom + 4) + "px";
          const lr = layer.getBoundingClientRect();
          if (lr.bottom > window.innerHeight - 8) {
            layer.style.top = (r.top - lr.height - 4) + "px";
          }
        };

        const close = () => {
          open = false;
          arrow.style.transform = "rotate(0deg)";
          if (layer) { layer.remove(); layer = null; }
          document.removeEventListener("click", onOutside, true);
          window.removeEventListener("scroll", onScroll, true);
        };

        const onOutside = (e) => {
          if (layer && !layer.contains(e.target) && e.target !== el && !el.contains(e.target)) {
            close();
          }
        };

        const onScroll = () => { reposition(); };

        el.onclick = (e) => {
          e.stopPropagation();
          if (open) { close(); return; }
          open = true;
          arrow.style.transform = "rotate(180deg)";

          layer = document.createElement("div");
          layer.style.position = "fixed";
          layer.style.minWidth = el.getBoundingClientRect().width + "px";
          layer.style.maxHeight = "280px";
          layer.style.overflow = "auto";
          layer.style.zIndex = "10001";
          layer.style.padding = "4px";
          layer.style.borderRadius = "12px";
          layer.style.border = "1px solid var(--border)";
          layer.style.background = "var(--panel-2)";
          layer.style.boxShadow = "var(--shadow)";
          layer.style.backdropFilter = "blur(18px)";
          layer.style.transition = "opacity 0.15s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease, border-color 0.3s ease";

          options.forEach(opt => {
            const row = document.createElement("div");
            row.style.padding = "9px 12px";
            row.style.borderRadius = "8px";
            row.style.fontSize = "12.5px";
            row.style.color = "var(--text)";
            row.style.cursor = "pointer";
            row.style.transition = "background 0.15s ease";
            row.textContent = opt.label;
            row.onmouseenter = () => { row.style.background = "var(--hover)"; };
            row.onmouseleave = () => { row.style.background = ""; };
            row.onclick = (ev) => {
              ev.stopPropagation();
              setLabel(opt.value);
              onChange(opt.value);
              close();
            };
            layer.appendChild(row);
          });

          document.body.appendChild(layer);
          reposition();
          // 入场动画
          layer.style.opacity = "0";
          layer.style.transform = "scale(0.95) translateY(-6px)";
          requestAnimationFrame(() => {
            layer.style.opacity = "1";
            layer.style.transform = "scale(1) translateY(0)";
          });

          setTimeout(() => {
            document.addEventListener("click", onOutside, true);
            window.addEventListener("scroll", onScroll, true);
          }, 0);
        };

        return { el, setValue: (val) => { setLabel(val); onChange(val); } };
      }

        const field = document.createElement("div");

      function fieldNumber(label, value, def, min, onChange) {
        const field = document.createElement("div");
        field.className = "field";
        field.innerHTML = `<div class="label">${escapeHtml(label)}</div>`;
        const input = document.createElement("input");
        input.className = "input";
        input.type = "number";
        input.step = "1";
        if (typeof min === "number") input.min = String(min);
        input.value = String(Number.isFinite(Number(value)) ? value : def);
        input.oninput = (e) => { onChange(Math.trunc(Number(e.target.value || def))); notifyChange(); };
        field.appendChild(input);
        return field;
      }

      function fieldNumberSmooth(label, value, def, min, setValue) {
        const field = document.createElement("div");
        field.className = "field";
        field.innerHTML = `<div class="label">${escapeHtml(label)}</div>`;
        const input = document.createElement("input");
        input.className = "input";
        input.type = "number";
        input.step = "1";
        if (typeof min === "number") input.min = String(min);
        input.value = String(Number.isFinite(Number(value)) ? value : def);
        input.addEventListener("input", (e) => {
          const raw = e.target.value;
          const n = raw === "" ? def : Number(raw);
          if (!Number.isFinite(n)) return;
          setValue(Math.trunc(n));
          notifyChange();
        });
        input.addEventListener("blur", (e) => {
          const raw = e.target.value;
          const n = raw === "" ? def : Number(raw);
          if (!Number.isFinite(n)) {
            input.value = String(def);
            setValue(Math.trunc(def));
            notifyChange();
            return;
          }
          const fixed = Math.trunc(n);
          input.value = String(fixed);
          setValue(fixed);
          notifyChange();
        });
        field.appendChild(input);
        return field;
      }
