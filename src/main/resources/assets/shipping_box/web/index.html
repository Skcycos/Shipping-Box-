      async function loadIconManifest() {
        try {
          const res = await fetch("/manifest?token=" + encodeURIComponent(token), { method: "GET" });
          if (!res.ok) throw new Error("manifest http " + res.status);
          const json = await res.json();

          if (json.status === "missing_cache" || !json.items) {
            state.iconManifest = null;
            state.iconCacheMap.clear();
            state.displayNameMap.clear();
            state.tagIconMap.clear();
            state.iconCacheReady = false;
            console.log("[Editor] Icon cache not ready:", json.message);
            return;
          }

          state.iconManifest = json;
          state.iconCacheMap.clear();
          state.displayNameMap.clear();
          state.tagIconMap.clear();

          const base = window.location.origin;

          if (Array.isArray(json.items)) {
            for (const it of json.items) {
              if (it.id && it.path) {
                const url = base + it.path + "?token=" + encodeURIComponent(token);
                state.iconCacheMap.set(it.id, url);
              }
              if (it.id && it.displayName) {
                state.displayNameMap.set(it.id, it.displayName);
              }
            }
          }
          if (Array.isArray(json.blocks)) {
            for (const b of json.blocks) {
              if (b.id && b.path) {
                const url = base + b.path + "?token=" + encodeURIComponent(token);
                state.iconCacheMap.set(b.id, url);
              }
              if (b.id && b.displayName) {
                if (!state.displayNameMap.has(b.id)) {
                  state.displayNameMap.set(b.id, b.displayName);
                }
              }
            }
          }
          // tag → 代表性图标
          if (json.tagIcons && typeof json.tagIcons === "object") {
            for (const [tagId, path] of Object.entries(json.tagIcons)) {
              state.tagIconMap.set(tagId, base + path + "?token=" + encodeURIComponent(token));
            }
          }
          // 完整 tag 列表覆盖 registry
          if (Array.isArray(json.tags)) {
            state.registry.tags = json.tags;
          }
          state.iconCacheReady = true;
          console.log("[Editor] Icon cache manifest loaded, items:", state.iconCacheMap.size);
          // 素材就绪，加载动态背景
          if (!bgParticlesSpawned) spawnBgParticles();
        } catch (e) {
          state.iconCacheReady = false;
          state.iconCacheMap.clear();
          state.displayNameMap.clear();
          state.tagIconMap.clear();
          console.warn("[Editor] Failed to load icon manifest:", e);
        }
      }

      async function refresh() {
        setSubtitle();
        const json = await apiLoadFile(state.file || "editor.json");
        if (json && json.ok === false) {
          toast(String(json.error || t("loadFailed")), "bad");
          state.rules = [];
          state.rulesVersion++;
          state.selectedId = null;
          render();
          return;
        }
        const raw = Array.isArray(json.rules) ? json.rules : [];
        state.rules = raw.map((r, idx) => fromJsonRule(r, idx));
        state.rulesVersion++;
        if (!state.selectedId && state.rules.length) state.selectedId = state.rules[0].id;
        render();

        // Load icon cache manifest (non-blocking, best effort)
        loadIconManifest().catch(() => {});

        toast(t("loaded", state.rules.length, (state.file || "editor.json")), "ok");

        }
      }, true);

      $("btnRefresh").onclick = () => refresh().catch((e) => toast(String(e.message || e), "bad"));
      $("btnOpenFile").onclick = () => {
        const v = ($("filePath").value || "").trim();
        state.file = v || "editor.json";
        state.selectedId = null;
        refresh().catch((e) => toast(String(e.message || e), "bad"));
      };
      $("btnNew").onclick = () => {
        const r = { id: "r_" + Date.now().toString(36) + "_" + Math.random().toString(16).slice(2), inputs: [{ kind: "item", value: "", count: 1, componentsText: "" }], output: { mode: "item", item: "", count: 1, componentsText: "" } };
        state.rules.unshift(r);
        state.rulesVersion++;
        state.selectedId = r.id;
        render();
      };
      $("btnDuplicate").onclick = () => {
        const r = selectedRule();
        if (!r) return;
        const copy = JSON.parse(JSON.stringify(r));
        copy.id = "r_" + Date.now().toString(36) + "_" + Math.random().toString(16).slice(2);
        state.rules.unshift(copy);
        state.rulesVersion++;
        state.selectedId = copy.id;
        render();
      };
      $("btnDelete").onclick = () => {
        const r = selectedRule();
        if (!r) return;
        if (!confirm(t("confirmDelete"))) return;
        const idx = state.rules.findIndex((x) => x.id === r.id);
        if (idx >= 0) state.rules.splice(idx, 1);
        state.rulesVersion++;
        state.selectedId = state.rules.length ? state.rules[Math.min(idx, state.rules.length - 1)].id : null;
        render();
      };

      $("btnSave").onclick = async () => {
        try {
          const payload = { rules: state.rules.map(toJsonRule) };
          const res = await apiSaveRules(payload);
          if (res && res.ok) {
            toast(t("saved", (res.savedPath || state.file)), "ok");
            const btn = $("btnSave");
            btn.classList.add("success-pulse");
            setTimeout(() => btn.classList.remove("success-pulse"), 800);
          } else {
            toast(String((res && res.error) || t("saveFailed")), "bad");
          }
        } catch (e) {
          toast(String(e.message || e), "bad");
        }
      };

      $("btnReloadFromGame").onclick = async () => {
        try {
          await apiReloadGame();
          toast(t("reloadQueued"), "ok");
        } catch (e) {
          toast(String(e.message || e), "bad");
        }
      };

      if (!token) {
        toast(t("missingToken"), "bad");
      } else {
        $("filePath").value = state.file || "editor.json";
        setSubtitle();
        loadRegistry()
          .catch((e) => toast(String(e.message || e), "bad"))
          .finally(() => refresh().catch((e) => toast(String(e.message || e), "bad")));
      }

      // 初始化 JSON 侧边栏
      initJsonSidebar();
    </script>
  </body>
</html>
