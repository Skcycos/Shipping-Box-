<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <style>
      :root {
        --bg: #0b0c0f;
        --bg-g1: rgba(10, 132, 255, 0.22);
        --bg-g2: rgba(48, 209, 88, 0.12);
        --bg-g3: rgba(255, 69, 58, 0.10);

        --panel: rgba(255, 255, 255, 0.06);
        --panel-2: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.62);
        --muted-2: rgba(255, 255, 255, 0.46);
        --accent: #0a84ff;
        --danger: #ff453a;
        --ok: #30d158;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        --radius: 16px;
        --radius-sm: 12px;
        --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        --topbar-bg1: rgba(255,255,255,0.08);
        --topbar-bg2: rgba(255,255,255,0.05);
        --hover: rgba(255, 255, 255, 0.10);
        --item-bg: rgba(255, 255, 255, 0.04);
        --item-bg-hover: rgba(255, 255, 255, 0.07);
        --badge-bg: rgba(255,255,255,0.06);
        --placeholder: rgba(255,255,255,0.35);
        --input-bg: rgba(255, 255, 255, 0.06);
        --chip-bg: rgba(255,255,255,0.06);
        --chip-border: rgba(255,255,255,0.14);
        --icon-bg: rgba(255, 255, 255, 0.06);
        --icon-border: rgba(255,255,255,0.14);
        --sep: rgba(255,255,255,0.10);
        --scrollbar-thumb: rgba(255,255,255,0.12);
        --toast-bg: rgba(20, 20, 24, 0.88);
        --toast-text: rgba(255,255,255,0.9);
        --toast-border: rgba(255,255,255,0.14);
      }

      :root[data-theme="light"] {
        --bg: #f5f6f8;
        --bg-g1: rgba(10, 132, 255, 0.14);
        --bg-g2: rgba(48, 209, 88, 0.10);
        --bg-g3: rgba(255, 69, 58, 0.08);

        --panel: rgba(255, 255, 255, 0.56);
        --panel-2: rgba(255, 255, 255, 0.66);
        --border: rgba(0, 0, 0, 0.10);
        --text: rgba(0, 0, 0, 0.88);
        --muted: rgba(0, 0, 0, 0.60);
        --muted-2: rgba(0, 0, 0, 0.44);
        --accent: #0a84ff;
        --danger: #d70015;
        --ok: #1f8a3b;
        --shadow: 0 18px 55px rgba(0, 0, 0, 0.12);
        --topbar-bg1: rgba(255,255,255,0.74);
        --topbar-bg2: rgba(255,255,255,0.56);
        --hover: rgba(0, 0, 0, 0.06);
        --item-bg: rgba(255, 255, 255, 0.54);
        --item-bg-hover: rgba(255, 255, 255, 0.70);
        --badge-bg: rgba(255,255,255,0.56);
        --placeholder: rgba(0,0,0,0.35);
        --input-bg: rgba(255, 255, 255, 0.74);
        --chip-bg: rgba(255,255,255,0.60);
        --chip-border: rgba(0,0,0,0.10);
        --icon-bg: rgba(255, 255, 255, 0.70);
        --icon-border: rgba(0,0,0,0.10);
        --sep: rgba(0,0,0,0.08);
        --scrollbar-thumb: rgba(0,0,0,0.16);
        --toast-bg: rgba(255, 255, 255, 0.78);
        --toast-text: rgba(0,0,0,0.86);
        --toast-border: rgba(0,0,0,0.10);
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100vh; }
      body {
        margin: 0;
        font-family: var(--font);
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 20% -10%, var(--bg-g1), transparent 60%),
          radial-gradient(900px 700px at 100% 0%, var(--bg-g2), transparent 55%),
          radial-gradient(700px 600px at 0% 100%, var(--bg-g3), transparent 60%),
          var(--bg);
        background-attachment: fixed;
        background-repeat: no-repeat;
        transition: background 0.3s ease, color 0.3s ease;
      }
      .app {
        max-width: 1240px;
        margin: 0 auto;
        padding: 28px 18px 32px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, var(--topbar-bg1), var(--topbar-bg2));
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      }
      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 220px;
      }
      .brand-title {
        font-size: 15px;
        letter-spacing: 0.2px;
        font-weight: 650;
      }
      .brand-sub {
        font-size: 12px;
        color: var(--muted);
        transition: color 0.3s ease;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .file {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 999px;
        font-size: 12.5px;
        outline: none;
        width: 260px;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .file::placeholder { color: var(--placeholder); }
      .btn {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 12.5px;
        line-height: 1;
        transition: transform 120ms ease, background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        user-select: none;
      }
      .btn.icon {
        width: 38px;
        padding: 9px 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn:hover {
        background: var(--hover);
        transform: translateY(-1px);
      }
      .btn.primary {
        border-color: rgba(10, 132, 255, 0.55);
        background: rgba(10, 132, 255, 0.18);
      }
      .btn.danger {
        border-color: rgba(255, 69, 58, 0.55);
        background: rgba(255, 69, 58, 0.14);
      }
      .btn.ghost {
        background: transparent;
      }
      .main {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 14px;
        margin-top: 14px;
      }
      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        overflow: hidden;
        transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      }
      .panel-header {
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        transition: border-color 0.3s ease;
      }
      .panel-title {
        font-size: 13px;
        font-weight: 650;
        color: var(--text);
      }
      .panel-body {
        padding: 12px 14px 14px;
      }
      .search {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 999px;
        font-size: 12.5px;
        outline: none;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .search::placeholder { color: var(--placeholder); }
      .list {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: calc(100vh - 220px);
        overflow: auto;
        padding-right: 6px;
      }
      .list::-webkit-scrollbar { width: 10px; }
      .list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; transition: background 0.3s ease; }
      .item {
        padding: 12px 12px;
        border: 1px solid var(--border);
        background: var(--item-bg);
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .item:hover { background: var(--item-bg-hover); border-color: var(--border); }
      .item.active { background: rgba(10, 132, 255, 0.16); border-color: rgba(10, 132, 255, 0.42); }
      .item-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .item-title {
        font-weight: 650;
        font-size: 12.5px;
        letter-spacing: 0.15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 260px;
      }
      .badge {
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        background: var(--badge-bg);
        padding: 4px 8px;
        border-radius: 999px;
        white-space: nowrap;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .item-sub {
        margin-top: 6px;
        font-size: 11.5px;
        color: var(--muted);
        line-height: 1.35;
        transition: color 0.3s ease;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
      }
      .field {
        grid-column: span 12;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .field.half { grid-column: span 6; }
      .field.third { grid-column: span 4; }
      .label {
        font-size: 12px;
        color: var(--muted);
        transition: color 0.3s ease;
      }
      .input, .select, .textarea {
        border: 1px solid var(--border);
        background: var(--input-bg);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 13px;
        outline: none;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .input-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .input-row .input { flex: 1; }
      .iconbox {
        width: 24px;
        height: 24px;
        border-radius: 8px;
        border: 1px solid var(--icon-border);
        background: var(--icon-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        flex: 0 0 24px;
        transition: background 0.3s ease, border-color 0.3s ease;
      }
      .iconbox img {
        width: 24px;
        height: 24px;
        display: block;
      }
      .textarea { min-height: 96px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; }
      .help {
        font-size: 11.5px;
        color: var(--muted-2);
        transition: color 0.3s ease;
      }
      .sep {
        height: 1px;
        background: var(--sep);
        margin: 12px 0;
        transition: background 0.3s ease;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .mini {
        font-size: 11.5px;
        color: var(--muted);
        transition: color 0.3s ease;
      }
      .chip {
        border: 1px solid var(--chip-border);
        background: var(--chip-bg);
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .chip.active {
        border-color: rgba(10, 132, 255, 0.55);
        background: rgba(10, 132, 255, 0.18);
      }
      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--toast-border);
        background: var(--toast-bg);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        font-size: 12.5px;
        color: var(--toast-text);
        display: none;
        max-width: 360px;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .toast.show { display: block; }
      .toast.ok { border-color: rgba(48,209,88,0.40); }
      .toast.bad { border-color: rgba(255,69,58,0.45); }
      @media (max-width: 980px) {
        .main { grid-template-columns: 1fr; }
        .list { max-height: 280px; }
      }
    </style>
  </head>

    <div class="app">
      <div class="topbar">
        <div class="brand">
          <div class="brand-title" id="brandTitle"></div>
          <div class="brand-sub" id="subTitle"></div>
        </div>
        <div class="actions">
          <button class="btn ghost icon" id="btnTheme"></button>
          <button class="btn ghost" id="btnLang"></button>
          <input class="file" id="filePath" placeholder="" />
          <button class="btn" id="btnOpenFile"></button>
          <button class="btn ghost" id="btnReloadFromGame"></button>
          <button class="btn" id="btnRefresh"></button>
          <button class="btn" id="btnNew"></button>
          <button class="btn" id="btnDuplicate"></button>
          <button class="btn danger" id="btnDelete"></button>
          <button class="btn primary" id="btnSave"></button>
        </div>
      </div>

      <div class="main">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title" id="rulesPanelTitle"></div>
            <div class="mini" id="ruleCount">0</div>
          </div>
          <div class="panel-body">
            <input class="search" id="search" placeholder="" />
            <div class="list" id="list"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div class="panel-title" id="editorTitle"></div>
            <div class="mini" id="editorMeta"></div>
          </div>
          <div class="panel-body" id="editor"></div>
        </div>
      </div>
    </div>

    <datalist id="dlItems"></datalist>
    <datalist id="dlTags"></datalist>

    <div class="toast" id="toast"></div>

          saveFailed: "Save failed",

          missingToken: "Missing token. Please open from the in-game command.",
          apiLoadFailed: (status) => "Load failed (HTTP " + status + ")",
          apiRegistryFailed: (status) => "Registry fetch failed (HTTP " + status + ")",
          apiSaveFailed: (status) => "Save failed (HTTP " + status + ")",
          apiReloadFailed: (status) => "Reload failed (HTTP " + status + ")"
        }
      };

      function currentLang() {
        return I18N[state.lang] ? state.lang : "en-US";
      }

      function t(key, ...args) {
        const dict = I18N[currentLang()];
        const path = String(key || "").split(".").filter(Boolean);
        let v = dict;
        for (const part of path) {
          if (v && typeof v === "object" && part in v) v = v[part];
          else { v = undefined; break; }
        }
        if (typeof v === "function") return v(...args);
        return v || "";
      }

      function detectDefaultLang() {
        const stored = localStorage.getItem(STORAGE_LANG);
        if (stored === "zh-CN" || stored === "en-US") return stored;
        const nav = (navigator.language || "").toLowerCase();
        if (nav.startsWith("zh")) return "zh-CN";
        return "en-US";
      }

      function detectDefaultThemePref() {
        const stored = localStorage.getItem(STORAGE_THEME);
        if (stored === "light" || stored === "dark" || stored === "system") return stored;
        return "system";
      }

      function getSystemTheme() {
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }

      function applyTheme() {
        const pref = state.theme || "system";
        const actual = pref === "system" ? getSystemTheme() : pref;
        document.documentElement.dataset.theme = actual;
        const btn = $("btnTheme");
        if (btn) btn.textContent = actual === "light" ? t("btnThemeDark") : t("btnThemeLight");
      }

      function applyI18nStatic() {
        document.documentElement.lang = currentLang();
        document.title = t("appTitle");
        $("brandTitle").textContent = t("appTitle");
        $("btnLang").textContent = t("btnLang");
        $("filePath").placeholder = t("filePlaceholder");
        $("btnOpenFile").textContent = t("btnOpenFile");
        $("btnReloadFromGame").textContent = t("btnReload");
        $("btnRefresh").textContent = t("btnRefresh");
        $("btnNew").textContent = t("btnNew");
        $("btnDuplicate").textContent = t("btnDuplicate");
        $("btnDelete").textContent = t("btnDelete");
        $("btnSave").textContent = t("btnSave");
        $("rulesPanelTitle").textContent = t("rulesList");
        $("search").placeholder = t("searchPlaceholder");
        if (!$("editorMeta").textContent) $("editorTitle").textContent = t("editor");
      }

      function toast(message, kind = "ok") {
        const el = $("toast");
        el.className = "toast show " + (kind === "bad" ? "bad" : "ok");
        el.textContent = message;
        setTimeout(() => {
          el.className = "toast";
        }, 2600);
      }

      function modeLabel(mode) {
        const m = String(mode || "");
        if (m === "item") return t("modeItem");
        if (m === "coin") return t("modeCoin");
        if (m === "dynamic_pricing") return t("modeDynamicPricing");
        if (m === "weight") return t("modeWeight");
        if (m === "ecliptic_seasons") return t("modeEclipticSeasons");
        return m || t("badgeRule");
      }

      function summarizeRule(r) {
        const inParts = (r.inputs || []).map((i) => {
          let name = (i.value || "").trim();
          if (i.kind === "tag" && name && !name.startsWith("#")) name = "#" + name;
          const count = Number(i.count || 1);
          return name + (count !== 1 ? "×" + count : "");
        }).filter(Boolean);

        const o = r.output || {};
        let outText = "";
        if (o.mode === "coin") outText = t("summaryCoin", Number(o.count || 0));
        else if (o.mode === "item") outText = (o.item || "").trim() + "×" + Number(o.count || 1);
        else if (o.mode === "dynamic_pricing") outText = t("summaryDynamicPricing", Boolean(o.coin));
        else if (o.mode === "weight") outText = t("summaryWeight", (o.items || []).length);
        else if (o.mode === "ecliptic_seasons") outText = t("summarySeasons");
        else outText = t("summaryOutput");

        return (inParts.join(" + ") || t("summaryEmpty")) + " → " + outText;
      }

      function parseMaybeJson(text) {
        const t = (text || "").trim();
        if (!t) return null;
        if (t.startsWith("{") || t.startsWith("[")) {
          try { return JSON.parse(t); } catch (_) { return t; }
        }
        return t;
      }

      function qualityFoodComponent(value) {
        if (value === "diamond") return { level: 3, type: "quality_food:diamond" };
        if (value === "gold") return { level: 2, type: "quality_food:gold" };
        if (value === "iron") return { level: 1, type: "quality_food:iron" };
        return null;
      }

      function componentsObjectFromText(text) {
        const parsed = parseMaybeJson(text);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
          return parsed;
        }
        return null;
      }

      function mergeComponentTemplate(currentText, newJson) {
        const base = componentsObjectFromText(currentText) || {};
        const merged = Object.assign({}, base, (newJson && typeof newJson === "object" ? newJson : {}));
        const keys = Object.keys(merged);
        if (keys.length === 0) return "";
        return JSON.stringify(merged, null, 2);
      }

      function removeComponentKey(currentText, key) {
        const base = componentsObjectFromText(currentText) || {};
        delete base[key];
        const keys = Object.keys(base);
        if (keys.length === 0) return "";
        return JSON.stringify(base, null, 2);
      }

      function getQualityFoodFromComponentsText(text) {
        const obj = componentsObjectFromText(text);
        if (!obj) return "normal";
        const q = obj["quality_food:quality"];
        if (!q || typeof q !== "object") return "normal";
        const type = String(q.type || "");
        if (type === "quality_food:diamond") return "diamond";
        if (type === "quality_food:gold") return "gold";
        if (type === "quality_food:iron") return "iron";
        return "normal";
      }

      function setQualityFoodInComponentsText(text, quality) {
        if (quality === "normal") {
          return removeComponentKey(text, "quality_food:quality");
        } else {
          const q = qualityFoodComponent(quality);
          if (q) return mergeComponentTemplate(text, { "quality_food:quality": q });
        }
        return String(text || "");
      }

      function renderQualityFoodField(currentComponentsText, onSelect) {
        const field = document.createElement("div");
        field.className = "field";
        field.innerHTML = `<div class="label">${escapeHtml(t("qualityLabel"))}</div><div class="help">${escapeHtml(t("qualityHelp"))}</div>`;
        field.appendChild(chipGroup(
          [
            { label: t("qualityNormal"), value: "normal" },
            { label: t("qualityIron"), value: "iron" },
            { label: t("qualityGold"), value: "gold" },
            { label: t("qualityDiamond"), value: "diamond" }
          ],
          getQualityFoodFromComponentsText(currentComponentsText),
          onSelect
        ));
        return field;
      }

      function renderPresetsField(currentComponentsText, onApply) {
        const field = document.createElement("div");
        field.className = "field";
        field.innerHTML = `<div class="label">${escapeHtml(t("presetsLabel"))}</div><div class="help">${escapeHtml(t("presetsHelp"))}</div>`;
        const row = document.createElement("div");
        row.className = "row";

        const presets = [
          { key: "tide", name: t("presets.tide.name"), inject: I18N[currentLang()]?.presets?.tide?.inject },
          { key: "brewing", name: t("presets.brewing.name"), inject: I18N[currentLang()]?.presets?.brewing?.inject }
        ];

        for (const p of presets) {
          const btn = document.createElement("div");
          btn.className = "chip";
          btn.textContent = p.name;
          btn.onclick = () => {
            const next = mergeComponentTemplate(currentComponentsText, p.inject || {});
            onApply(next);
            toast(t("presetsApplied", p.name), "ok");
          };
          row.appendChild(btn);
        }
        field.appendChild(row);

        const qualityBlock = document.createElement("div");
        qualityBlock.className = "field";
        qualityBlock.innerHTML = `<div class="label">${escapeHtml(t("qualityLabel"))}</div><div class="help">${escapeHtml(t("qualityHelp"))}</div>`;
        qualityBlock.appendChild(chipGroup(
          [
            { label: t("qualityNormal"), value: "normal" },
            { label: t("qualityIron"), value: "iron" },
            { label: t("qualityGold"), value: "gold" },
            { label: t("qualityDiamond"), value: "diamond" }
          ],
          getQualityFoodFromComponentsText(currentComponentsText),
          (v) => {
            const next = setQualityFoodInComponentsText(currentComponentsText, v);
            onApply(next);
            const name = t("qualityLabel") + " - " + (
              v === "iron" ? t("qualityIron") :
              v === "gold" ? t("qualityGold") :
              v === "diamond" ? t("qualityDiamond") :
              t("qualityNormal")
            );
            toast(t("presetsApplied", name), "ok");
          }
        ));
        field.appendChild(qualityBlock);
        return field;
      }

      function parseIntList(text) {
        const parts = String(text || "")
          .split(/[\s,]+/g)
          .map((s) => s.trim())
          .filter(Boolean);
        const nums = [];
        for (const p of parts) {
          const n = Number(p);
          if (!Number.isFinite(n)) continue;
          nums.push(Math.trunc(n));
        }
        return nums;
      }

      function fromJsonRule(rule, idx) {
        const id = "r_" + (Date.now().toString(36)) + "_" + idx + "_" + Math.random().toString(16).slice(2);
        const inputRaw = rule.input;
        const inputsArr = Array.isArray(inputRaw) ? inputRaw : (inputRaw ? [inputRaw] : []);
        const inputs = inputsArr.map((i) => ({
          kind: i.tag ? "tag" : "item",
          value: i.tag ? (String(i.tag || "").startsWith("#") ? String(i.tag) : ("#" + String(i.tag || ""))) : (i.item || ""),
          count: Number(i.count || 1),
          componentsText: (typeof i.components === "object") ? JSON.stringify(i.components, null, 2) : (i.components || "")
        }));

        const out = rule.output || {};
        let output = { mode: "item", item: "", count: 1, componentsText: "" };
        if (out.type === "dynamic_pricing") {
          output = {
            mode: "dynamic_pricing",
            coin: Boolean(out.coin),
            item: out.item || "",
            day: out.dynamic_properties && Number.isFinite(Number(out.dynamic_properties.day)) ? Number(out.dynamic_properties.day) : 0,
            thresholdText: out.dynamic_properties && Array.isArray(out.dynamic_properties.threshold) ? out.dynamic_properties.threshold.join(", ") : "",
            valueText: out.dynamic_properties && Array.isArray(out.dynamic_properties.value) ? out.dynamic_properties.value.join(", ") : ""
          };
        } else if (out.type === "weight") {
          output = {
            mode: "weight",
            items: (out.items || []).map((w) => ({
              item: w.item || "",
              count: Number(w.count || 1),
              weight: Number(w.weight || 1),
              componentsText: (typeof w.components === "object") ? JSON.stringify(w.components, null, 2) : (w.components || "")
            }))
          };
        } else if (out.type === "ecliptic_seasons") {
          const ecs = out.ecliptic_seasons || {};
          output = {
            mode: "ecliptic_seasons",
            item: out.item || "",
            count: Number(out.count || 1),
            componentsText: (typeof out.components === "object") ? JSON.stringify(out.components, null, 2) : (out.components || ""),
            seasonalOnly: Boolean(ecs.seasonal_only),
            seasonText: Array.isArray(ecs.season) ? ecs.season.join(", ") : "",
            addBonus: Number.isFinite(Number(ecs.add_season_bonus)) ? Number(ecs.add_season_bonus) : 0,
            reduceBonus: Number.isFinite(Number(ecs.reduce_season_bonus)) ? Number(ecs.reduce_season_bonus) : 0
          };
        } else if (out.coin) {
          output = { mode: "coin", count: Number(out.count || 0) };
        } else {
          output = {
            mode: "item",
            item: out.item || "",
            count: Number(out.count || 1),
            componentsText: (typeof out.components === "object") ? JSON.stringify(out.components, null, 2) : (out.components || "")
          };
        }

        return { id, inputs, output };
      }

      function toJsonRule(model) {
        const input = (model.inputs || []).map((i) => {
          const obj = { count: Math.max(1, Math.trunc(Number(i.count || 1))) };
          const value = (i.value || "").trim();
          if (i.kind === "tag") obj.tag = value.startsWith("#") ? value : ("#" + value);
          else obj.item = value;
          const comp = parseMaybeJson(i.componentsText);
          if (comp !== null && comp !== "") obj.components = comp;
          return obj;
        });

        const o = model.output || {};
        let output = {};
        if (o.mode === "coin") {
          output = { coin: true, count: Math.max(0, Math.trunc(Number(o.count || 0))) };
        } else if (o.mode === "dynamic_pricing") {
          output = {
            type: "dynamic_pricing",
            dynamic_properties: {
              threshold: parseIntList(o.thresholdText),
              value: parseIntList(o.valueText),
              day: Math.trunc(Number(o.day || 0))
            }
          };
          if (o.coin) output.coin = true;
          else output.item = (o.item || "").trim();
        } else if (o.mode === "weight") {
          output = {
            type: "weight",
            items: (o.items || []).map((w) => {
              const itemObj = {
                item: (w.item || "").trim(),
                count: Math.max(1, Math.trunc(Number(w.count || 1))),
                weight: Math.max(1, Math.trunc(Number(w.weight || 1)))
              };
              const comp = parseMaybeJson(w.componentsText);
              if (comp !== null && comp !== "") itemObj.components = comp;
              return itemObj;
            })
          };
        } else if (o.mode === "ecliptic_seasons") {
          output = {
            type: "ecliptic_seasons",
            item: (o.item || "").trim(),
            count: Math.max(1, Math.trunc(Number(o.count || 1))),
            ecliptic_seasons: {
              season: String(o.seasonText || "").split(/[\s,]+/g).map((s) => s.trim()).filter(Boolean),
              seasonal_only: Boolean(o.seasonalOnly),
              add_season_bonus: Math.trunc(Number(o.addBonus || 0)),
              reduce_season_bonus: Math.trunc(Number(o.reduceBonus || 0))
            }
          };
          const comp = parseMaybeJson(o.componentsText);
          if (comp !== null && comp !== "") output.components = comp;
        } else {
          output = {
            item: (o.item || "").trim(),
            count: Math.max(1, Math.trunc(Number(o.count || 1)))
          };
          const comp = parseMaybeJson(o.componentsText);
          if (comp !== null && comp !== "") output.components = comp;
        }

        return { input, output };
      }

      function selectedRule() {
        return state.rules.find((r) => r.id === state.selectedId) || null;
      }

      function setSelected(id) {
        state.selectedId = id;
        render();
      }

      function renderList() {
        const list = $("list");
        list.innerHTML = "";
        const q = state.filter.trim().toLowerCase();
        const rules = state.rules.filter((r) => {
          if (!q) return true;
          const text = summarizeRule(r).toLowerCase();
          const type = (r.output && r.output.mode) ? String(r.output.mode) : "";
          return text.includes(q) || type.includes(q);
        });

        $("ruleCount").textContent = String(rules.length);

        for (const r of rules) {
          const el = document.createElement("div");
          el.className = "item" + (r.id === state.selectedId ? " active" : "");
          el.onclick = () => setSelected(r.id);

          const title = summarizeRule(r);
          const badgeText = r.output && r.output.mode ? modeLabel(r.output.mode) : t("badgeRule");

          el.innerHTML = `
            <div class="item-top">
              <div class="item-title">${escapeHtml(title)}</div>
              <div class="badge">${escapeHtml(badgeText)}</div>
            </div>
            <div class="item-sub">${escapeHtml(t("itemSub", r.inputs.length))}</div>
          `;
          list.appendChild(el);
        }
      }

      function escapeHtml(s) {
        return String(s || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function isValidNamespaceId(value) {
        return /^[a-z0-9_.-]+:[a-z0-9_./-]+$/.test(String(value || "").trim());
      }

      function iconUrl(id) {
        return "/api/icon?token=" + encodeURIComponent(token) + "&id=" + encodeURIComponent(id);
      }

      function createIconBox() {
        const box = document.createElement("div");
        box.className = "iconbox";
        const img = document.createElement("img");
        img.alt = "";
        img.decoding = "async";
        img.src = TRANSPARENT_IMG;
        img.onerror = () => { img.src = TRANSPARENT_IMG; };
        box.appendChild(img);
        return { box, img };
      }

      function updateIconForValue(img, value) {
        const v = String(value || "").trim();
        if (!isValidNamespaceId(v)) {
          img.src = TRANSPARENT_IMG;
          return;
        }
        if (!state.registryItemsSet || !state.registryItemsSet.has(v)) {
          img.src = iconUrl("minecraft:barrier");
          return;
        }
        img.src = iconUrl(v);
      }

      function bindDebouncedIcon(input, img) {
        let timer = null;
        const update = () => updateIconForValue(img, input.value);
        input.addEventListener("input", () => {
          if (timer) clearTimeout(timer);
          timer = setTimeout(update, 300);
        });
        update();
      }

      function chipGroup(options, active, onChange) {
        const row = document.createElement("div");
        row.className = "row";
        for (const opt of options) {
          const c = document.createElement("div");
          c.className = "chip" + (opt.value === active ? " active" : "");
          c.textContent = opt.label;
          c.onclick = () => onChange(opt.value);
          row.appendChild(c);
        }
        return row;
      }

      function renderEditor() {
        const editor = $("editor");
        const r = selectedRule();
        if (!r) {
          editor.innerHTML = `
            <div class="help">${escapeHtml(t("helpEmpty"))}</div>
          `;
          $("editorTitle").textContent = t("editor");
          $("editorMeta").textContent = "";
          return;
        }

        $("editorTitle").textContent = t("editorRule");
        $("editorMeta").textContent = t("editorMeta", r.inputs.length, modeLabel(r.output && r.output.mode ? r.output.mode : ""));

        const root = document.createElement("div");
        root.className = "grid";

        const inputsHeader = document.createElement("div");
        inputsHeader.className = "field";
        inputsHeader.innerHTML = `<div class="label">${escapeHtml(t("inputsLabel"))}</div><div class="help">${escapeHtml(t("inputsHelp"))}</div>`;
        root.appendChild(inputsHeader);

        const inputBtns = document.createElement("div");
        inputBtns.className = "field";
        const row = document.createElement("div");
        row.className = "row";
        const addItem = document.createElement("button");
        addItem.className = "btn";
        addItem.textContent = t("addInput");
        addItem.onclick = () => {
          r.inputs.push({ kind: "item", value: "", count: 1, componentsText: "" });
          render();
        };
        const clearInputs = document.createElement("button");
        clearInputs.className = "btn ghost";
        clearInputs.textContent = t("clearInputs");
        clearInputs.onclick = () => {
          r.inputs = [];
          render();
        };
        row.appendChild(addItem);
        row.appendChild(clearInputs);
        inputBtns.appendChild(row);
        root.appendChild(inputBtns);

        r.inputs.forEach((inp, idx) => {
          const kindField = document.createElement("div");
          kindField.className = "field third";
          kindField.innerHTML = `<div class="label">${escapeHtml(t("labelType"))}</div>`;
          kindField.appendChild(chipGroup(
            [{ label: t("kindItem"), value: "item" }, { label: t("kindTag"), value: "tag" }],
            inp.kind,
            (v) => { inp.kind = v; render(); }
          ));
          root.appendChild(kindField);

          const valueField = document.createElement("div");
          valueField.className = "field";
          valueField.style.gridColumn = "span 6";
          valueField.innerHTML = `<div class="label">${escapeHtml(inp.kind === "tag" ? t("labelTagId") : t("labelItemId"))}</div>`;
          const valueInput = document.createElement("input");
          valueInput.className = "input";
          valueInput.placeholder = inp.kind === "tag" ? t("placeholderTagId") : t("placeholderItemId");
          valueInput.value = inp.value || "";
          valueInput.setAttribute("list", inp.kind === "tag" ? "dlTags" : "dlItems");
          valueInput.oninput = (e) => { inp.value = e.target.value; renderList(); };
          const valueRow = document.createElement("div");
          valueRow.className = "input-row";
          if (inp.kind === "item") {
            const { box, img } = createIconBox();
            valueRow.appendChild(box);
            valueRow.appendChild(valueInput);
            bindDebouncedIcon(valueInput, img);
          } else {
            valueRow.appendChild(valueInput);
          }
          valueField.appendChild(valueRow);
          root.appendChild(valueField);

          const countField = document.createElement("div");
          countField.className = "field third";
          countField.innerHTML = `<div class="label">${escapeHtml(t("labelCount"))}</div>`;
          const countInput = document.createElement("input");
          countInput.className = "input";
          countInput.type = "number";
          countInput.min = "1";
          countInput.step = "1";
          countInput.value = String(inp.count || 1);
          countInput.oninput = (e) => { inp.count = Number(e.target.value || 1); renderList(); };
          countField.appendChild(countInput);
          root.appendChild(countField);

        // Quality moved into presets panel below

          const compField = document.createElement("div");
          compField.className = "field";
          compField.innerHTML = `<div class="label">${escapeHtml(t("labelComponents"))}</div>`;
          const comp = document.createElement("textarea");
          comp.className = "textarea";
          comp.placeholder = t("placeholderComponentsExampleInput");
          comp.value = inp.componentsText || "";
          comp.oninput = (e) => { inp.componentsText = e.target.value; };
          compField.appendChild(comp);
          const presetsField = renderPresetsField(inp.componentsText, (next) => { inp.componentsText = next; render(); });
          compField.appendChild(presetsField);

          const removeRow = document.createElement("div");
          removeRow.className = "row";
          const removeBtn = document.createElement("button");
          removeBtn.className = "btn danger";
          removeBtn.textContent = t("removeInput");
          removeBtn.onclick = () => {
            r.inputs.splice(idx, 1);
            render();
          };
          removeRow.appendChild(removeBtn);
          compField.appendChild(removeRow);
          root.appendChild(compField);

          const sep = document.createElement("div");
          sep.className = "sep";
          sep.style.gridColumn = "span 12";
          root.appendChild(sep);
        });

        const outHeader = document.createElement("div");
        outHeader.className = "field";
        outHeader.innerHTML = `<div class="label">${escapeHtml(t("outputLabel"))}</div><div class="help">${escapeHtml(t("outputHelp"))}</div>`;
        root.appendChild(outHeader);

        const outModeField = document.createElement("div");
        outModeField.className = "field";
        outModeField.appendChild(chipGroup(
          [
            { label: t("modeItem"), value: "item" },
            { label: t("modeCoin"), value: "coin" },
            { label: t("modeDynamicPricing"), value: "dynamic_pricing" },
            { label: t("modeWeight"), value: "weight" },
            { label: t("modeEclipticSeasons"), value: "ecliptic_seasons" }
          ],
          r.output.mode,
          (v) => {
            if (v === "item") r.output = { mode: "item", item: "", count: 1, componentsText: "" };
            else if (v === "coin") r.output = { mode: "coin", count: 0 };
            else if (v === "dynamic_pricing") r.output = { mode: "dynamic_pricing", coin: false, item: "", day: 0, thresholdText: "", valueText: "" };
            else if (v === "weight") r.output = { mode: "weight", items: [{ item: "", count: 1, weight: 1, componentsText: "" }] };
            else r.output = { mode: "ecliptic_seasons", item: "", count: 1, componentsText: "", seasonalOnly: false, seasonText: t("placeholderSeasonExample"), addBonus: 0, reduceBonus: 0 };
            render();
          }
        ));
        root.appendChild(outModeField);

        renderOutputDetails(root, r);

        const jsonField = document.createElement("div");
        jsonField.className = "field";
        jsonField.innerHTML = `<div class="label">${escapeHtml(t("jsonPreview"))}</div><div class="help">${escapeHtml(t("jsonHelp"))}</div>`;
        const preview = document.createElement("textarea");
        preview.className = "textarea";
        preview.readOnly = true;
        preview.value = JSON.stringify(toJsonRule(r), null, 2);
        jsonField.appendChild(preview);
        root.appendChild(jsonField);

        editor.innerHTML = "";
        editor.appendChild(root);
      }

      function renderOutputDetails(root, r) {
        const o = r.output || {};
        if (o.mode === "coin") {
          const count = fieldNumber(t("coinCount"), o.count, 0, 0, (v) => { o.count = v; renderList(); renderEditor(); });
          root.appendChild(count);
          return;
        }

        if (o.mode === "item") {
          const item = fieldText(t("labelItemId"), o.item, t("placeholderItemId"), (v) => { o.item = v; renderList(); }, "dlItems");
          item.classList.add("half");
          root.appendChild(item);
          const count = fieldNumber(t("labelCount"), o.count, 1, 1, (v) => { o.count = v; renderList(); });
          count.classList.add("half");
          root.appendChild(count);
          const comp = fieldTextarea(t("labelComponents"), o.componentsText, t("placeholderComponentsExampleOutput"), (v) => { o.componentsText = v; });
          root.appendChild(comp);
          const presets = renderPresetsField(o.componentsText, (next) => { o.componentsText = next; render(); });
          root.appendChild(presets);
          return;
        }

        if (o.mode === "dynamic_pricing") {
          const coinToggle = document.createElement("div");
          coinToggle.className = "field";
          coinToggle.innerHTML = `<div class="label">${escapeHtml(t("outputCoin"))}</div>`;
          coinToggle.appendChild(chipGroup(
            [{ label: t("no"), value: "no" }, { label: t("yes"), value: "yes" }],
            o.coin ? "yes" : "no",
            (v) => { o.coin = (v === "yes"); render(); }
          ));
          root.appendChild(coinToggle);

          if (!o.coin) {
            const item = fieldText(t("outputItemLabel"), o.item, t("placeholderItemId"), (v) => { o.item = v; renderList(); }, "dlItems");
            root.appendChild(item);
          }

          const day = fieldNumber(t("dynamicDayLabel"), o.day, 0, -1, (v) => { o.day = v; });
          root.appendChild(day);

          const th = fieldTextarea(t("dynamicThresholdLabel"), o.thresholdText, t("placeholderThresholdExample"), (v) => { o.thresholdText = v; });
          root.appendChild(th);
          const val = fieldTextarea(t("dynamicValueLabel"), o.valueText, t("placeholderValueExample"), (v) => { o.valueText = v; });
          root.appendChild(val);
          return;
        }

        if (o.mode === "weight") {
          const header = document.createElement("div");
          header.className = "field";
          header.innerHTML = `<div class="label">${escapeHtml(t("weightedList"))}</div><div class="help">${escapeHtml(t("weightedHelp"))}</div>`;
          root.appendChild(header);

          const row = document.createElement("div");
          row.className = "field";
          const buttons = document.createElement("div");
          buttons.className = "row";
          const add = document.createElement("button");
          add.className = "btn";
          add.textContent = t("addCandidate");
          add.onclick = () => { o.items.push({ item: "", count: 1, weight: 1, componentsText: "" }); render(); };
          const clear = document.createElement("button");
          clear.className = "btn ghost";
          clear.textContent = t("clearCandidates");
          clear.onclick = () => { o.items = []; render(); };
          buttons.appendChild(add);
          buttons.appendChild(clear);
          row.appendChild(buttons);
          root.appendChild(row);

          o.items.forEach((w, idx) => {
            const item = fieldText(t("candidateItemLabel"), w.item, t("placeholderItemId"), (v) => { w.item = v; renderList(); }, "dlItems");
            item.classList.add("half");
            root.appendChild(item);
            const count = fieldNumber(t("labelCount"), w.count, 1, 1, (v) => { w.count = v; });
            count.classList.add("third");
            root.appendChild(count);
            const weight = fieldNumber(t("weightLabel"), w.weight, 1, 1, (v) => { w.weight = v; });
            weight.classList.add("third");
            root.appendChild(weight);
            const comp = fieldTextarea(t("labelComponents"), w.componentsText, "", (v) => { w.componentsText = v; });
            root.appendChild(comp);
            const presets = renderPresetsField(w.componentsText, (next) => { w.componentsText = next; render(); });
            root.appendChild(presets);

            const remove = document.createElement("div");
            remove.className = "field";
            const rr = document.createElement("div");
            rr.className = "row";
            const btn = document.createElement("button");
            btn.className = "btn danger";
            btn.textContent = t("removeCandidate");
            btn.onclick = () => { o.items.splice(idx, 1); render(); };
            rr.appendChild(btn);
            remove.appendChild(rr);
            root.appendChild(remove);

            const sep = document.createElement("div");
            sep.className = "sep";
            sep.style.gridColumn = "span 12";
            root.appendChild(sep);
          });
          return;
        }

        if (o.mode === "ecliptic_seasons") {
          const item = fieldText(t("outputItemLabel"), o.item, t("placeholderItemId"), (v) => { o.item = v; renderList(); }, "dlItems");
          item.classList.add("half");
          root.appendChild(item);
          const count = fieldNumber(t("labelCount"), o.count, 1, 1, (v) => { o.count = v; renderList(); });
          count.classList.add("half");
          root.appendChild(count);
          const seasons = fieldText(t("seasonLabel"), o.seasonText, t("placeholderSeasonExample"), (v) => { o.seasonText = v; });
          root.appendChild(seasons);

          const seasonalOnly = document.createElement("div");
          seasonalOnly.className = "field";
          seasonalOnly.innerHTML = `<div class="label">${escapeHtml(t("seasonalOnlyLabel"))}</div>`;
          seasonalOnly.appendChild(chipGroup(
            [{ label: t("no"), value: "no" }, { label: t("yes"), value: "yes" }],
            o.seasonalOnly ? "yes" : "no",
            (v) => { o.seasonalOnly = (v === "yes"); }
          ));
          root.appendChild(seasonalOnly);

          const addBonus = fieldNumber(t("addBonusLabel"), o.addBonus, 0, 0, (v) => { o.addBonus = v; });
          addBonus.classList.add("half");
          root.appendChild(addBonus);
          const reduceBonus = fieldNumber(t("reduceBonusLabel"), o.reduceBonus, 0, 0, (v) => { o.reduceBonus = v; });
          reduceBonus.classList.add("half");
          root.appendChild(reduceBonus);

          const comp = fieldTextarea(t("labelComponents"), o.componentsText, "", (v) => { o.componentsText = v; });
          root.appendChild(comp);
          const presets = renderPresetsField(o.componentsText, (next) => { o.componentsText = next; render(); });
          root.appendChild(presets);
          return;
        }
      }

      function fieldText(label, value, placeholder, onChange, listId) {
        const field = document.createElement("div");
        field.className = "field";
        field.innerHTML = `<div class="label">${escapeHtml(label)}</div>`;
        const input = document.createElement("input");
        input.className = "input";
        input.placeholder = placeholder || "";
        input.value = value || "";
        if (listId) input.setAttribute("list", listId);
        input.oninput = (e) => onChange(e.target.value);
        if (listId === "dlItems") {
          const row = document.createElement("div");
          row.className = "input-row";
          const { box, img } = createIconBox();
          row.appendChild(box);
          row.appendChild(input);
          bindDebouncedIcon(input, img);
          field.appendChild(row);
        } else {
          field.appendChild(input);
        }
        return field;
      }

      function fieldNumber(label, value, def, min, onChange) {
        const field = document.createElement("div");
        field.className = "field";
        field.innerHTML = `<div class="label">${escapeHtml(label)}</div>`;
        const input = document.createElement("input");
        input.className = "input";
        input.type = "number";
        input.step = "1";
        if (typeof min === "number") input.min = String(min);
        input.value = String(Number.isFinite(Number(value)) ? value : def);
        input.oninput = (e) => onChange(Math.trunc(Number(e.target.value || def)));
        field.appendChild(input);
        return field;
      }

      function fieldTextarea(label, value, placeholder, onChange) {
        const field = document.createElement("div");
        field.className = "field";
        field.innerHTML = `<div class="label">${escapeHtml(label)}</div>`;
        const input = document.createElement("textarea");
        input.className = "textarea";
        input.placeholder = placeholder || "";
        input.value = value || "";
        input.oninput = (e) => onChange(e.target.value);
        field.appendChild(input);
        return field;
      }

      function render() {
        renderList();
        renderEditor();
      }

      function setSubtitle() {
        $("subTitle").textContent = t("subTitleFallback", (state.file || "editor.json"));
      }

      async function apiLoadFile(file) {
        const res = await fetch("/api/load?token=" + encodeURIComponent(token) + "&file=" + encodeURIComponent(file), { method: "GET" });
        if (!res.ok) throw new Error(t("apiLoadFailed", res.status));
        return await res.json();
      }

      async function loadRegistry() {
        const res = await fetch("/api/registry?token=" + encodeURIComponent(token), { method: "GET" });
        if (!res.ok) throw new Error(t("apiRegistryFailed", res.status));
        const json = await res.json();
        state.registry.items = Array.isArray(json.items) ? json.items : [];
        state.registry.tags = Array.isArray(json.tags) ? json.tags : [];
        state.registryItemsSet = new Set(state.registry.items.map((x) => String(x)));
        syncDatalists();
      }

      function syncDatalists() {
        const dlItems = $("dlItems");
        const dlTags = $("dlTags");
        if (dlItems) {
          dlItems.innerHTML = "";
          for (const id of state.registry.items) {
            const opt = document.createElement("option");
            opt.value = String(id);
            dlItems.appendChild(opt);
          }
        }
        if (dlTags) {
          dlTags.innerHTML = "";
          for (const id of state.registry.tags) {
            const opt = document.createElement("option");
            opt.value = String(id);
            dlTags.appendChild(opt);
          }
        }
      }

      async function apiSaveRules(payload) {
        const res = await fetch("/api/save?token=" + encodeURIComponent(token) + "&file=" + encodeURIComponent(state.file || "editor.json"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error(t("apiSaveFailed", res.status));
        return await res.json();
      }

      async function apiReloadGame() {
        const res = await fetch("/api/reload?token=" + encodeURIComponent(token), { method: "POST" });
        if (!res.ok) throw new Error(t("apiReloadFailed", res.status));
        return await res.json();
      }

      async function refresh() {
        setSubtitle();
        const json = await apiLoadFile(state.file || "editor.json");
        if (json && json.ok === false) {
          toast(String(json.error || t("loadFailed")), "bad");
          state.rules = [];
          state.selectedId = null;
          render();
          return;
        }
        const raw = Array.isArray(json.rules) ? json.rules : [];
        state.rules = raw.map((r, idx) => fromJsonRule(r, idx));
        if (!state.selectedId && state.rules.length) state.selectedId = state.rules[0].id;
        render();
        toast(t("loaded", state.rules.length, (state.file || "editor.json")), "ok");
      }

      state.lang = detectDefaultLang();
      state.theme = detectDefaultThemePref();
      applyI18nStatic();
      applyTheme();
      setSubtitle();

      $("btnLang").onclick = () => {
        state.lang = state.lang === "zh-CN" ? "en-US" : "zh-CN";
        localStorage.setItem(STORAGE_LANG, state.lang);
        applyI18nStatic();
        applyTheme();
        setSubtitle();
        render();
      };

      $("btnTheme").onclick = () => {
        const currentActual = (state.theme === "system" ? getSystemTheme() : state.theme);
        state.theme = currentActual === "light" ? "dark" : "light";
        localStorage.setItem(STORAGE_THEME, state.theme);
        applyTheme();
      };

      if (window.matchMedia) {
        const media = window.matchMedia("(prefers-color-scheme: light)");
        const listener = () => {
          if (state.theme === "system") {
            applyTheme();
          }
        };
        if (media.addEventListener) media.addEventListener("change", listener);
        else if (media.addListener) media.addListener(listener);
      }

      $("search").addEventListener("input", (e) => {
        state.filter = e.target.value || "";
        renderList();
      });

      $("btnRefresh").onclick = () => refresh().catch((e) => toast(String(e.message || e), "bad"));
      $("btnOpenFile").onclick = () => {
        const v = ($("filePath").value || "").trim();
        state.file = v || "editor.json";
        state.selectedId = null;
        refresh().catch((e) => toast(String(e.message || e), "bad"));
      };
      $("btnNew").onclick = () => {
        const r = { id: "r_" + Date.now().toString(36) + "_" + Math.random().toString(16).slice(2), inputs: [{ kind: "item", value: "", count: 1, componentsText: "" }], output: { mode: "item", item: "", count: 1, componentsText: "" } };
        state.rules.unshift(r);
        state.selectedId = r.id;
        render();
      };
      $("btnDuplicate").onclick = () => {
        const r = selectedRule();
        if (!r) return;
        const copy = JSON.parse(JSON.stringify(r));
        copy.id = "r_" + Date.now().toString(36) + "_" + Math.random().toString(16).slice(2);
        state.rules.unshift(copy);
        state.selectedId = copy.id;
        render();
      };
      $("btnDelete").onclick = () => {
        const r = selectedRule();
        if (!r) return;
        if (!confirm(t("confirmDelete"))) return;
        const idx = state.rules.findIndex((x) => x.id === r.id);
        if (idx >= 0) state.rules.splice(idx, 1);
        state.selectedId = state.rules.length ? state.rules[Math.min(idx, state.rules.length - 1)].id : null;
        render();
      };

      $("btnSave").onclick = async () => {
        try {
          const payload = { rules: state.rules.map(toJsonRule) };
          const res = await apiSaveRules(payload);
          if (res && res.ok) {
            toast(t("saved", (res.savedPath || state.file)), "ok");
          } else {
            toast(String((res && res.error) || t("saveFailed")), "bad");
          }
        } catch (e) {
          toast(String(e.message || e), "bad");
        }
      };

      $("btnReloadFromGame").onclick = async () => {
        try {
          await apiReloadGame();
          toast(t("reloadQueued"), "ok");
        } catch (e) {
          toast(String(e.message || e), "bad");
        }
      };

      if (!token) {
        toast(t("missingToken"), "bad");
      } else {
        $("filePath").value = state.file || "editor.json";
        setSubtitle();
        loadRegistry()
          .catch((e) => toast(String(e.message || e), "bad"))
          .finally(() => refresh().catch((e) => toast(String(e.message || e), "bad")));
      }
    </script>
  </body>
</html>
